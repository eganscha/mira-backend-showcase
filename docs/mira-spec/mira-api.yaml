                    detail: User with the given identifier was not found
                    instance: /v1/users/11aa11aa-1111-1111-1111-aaaaaaaaaaaa/calendar
  "/v1/users/{userId}/schedule":
    parameters:
      - "$ref": "#/components/parameters/UserIdParam"
    get:
      summary: "Get a user's weekly schedule"
      description: "Returns the user's recurring weekly working hours, used as the default availability envelope when consumers browse the provider's calendar. Returns an empty entries array if the provider has not yet set up a schedule. The userId in the path must match the authenticated user, or the authenticated user must have administrator privileges."
      tags:
        - Schedule
      security:
        - bearerHttpAuthentication: []
      responses:
        "200":
          description: Weekly schedule retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/WeeklySchedule"
              examples:
                default:
                  summary: Example weekly schedule
                  value:
                    timezone: Europe/Berlin
                    entries:
                      - dayOfWeek: MON
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: TUE
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: WED
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: THU
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: FRI
                        startTime: "09:00"
                        endTime: "17:00"
        "401":
          "$ref": "#/components/responses/UnauthorizedError"
          description: Unauthorized. Authentication is required.
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                notOwner:
                  summary: Authenticated user is not the target user
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: Forbidden
                    status: 403
                    detail: "Authenticated user is not allowed to access this user's schedule"
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
                notProvider:
                  summary: Target user is not a provider
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: Forbidden
                    status: 403
                    detail: Only providers can manage a weekly schedule
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: Not Found
                    status: 404
                    detail: User with the given identifier was not found
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
    put:
      summary: "Replace a user's weekly schedule"
      description: "Replaces the user's recurring weekly schedule with the provided entries. The whole schedule is rewritten atomically; entries not present in the request body are removed. Entries on the same day must not overlap and each entry's endTime must be strictly after its startTime. The userId in the path must match the authenticated user, or the authenticated user must have administrator privileges."
      tags:
        - Schedule
      security:
        - bearerHttpAuthentication: []
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/ReplaceWeeklyScheduleRequest"
            examples:
              default:
                summary: Example weekly schedule replacement
                value:
                  timezone: Europe/Berlin
                  entries:
                    - dayOfWeek: MON
                      startTime: "09:00"
                      endTime: "17:00"
                    - dayOfWeek: TUE
                      startTime: "09:00"
                      endTime: "17:00"
                    - dayOfWeek: WED
                      startTime: "09:00"
                      endTime: "17:00"
                    - dayOfWeek: THU
                      startTime: "09:00"
                      endTime: "17:00"
                    - dayOfWeek: FRI
                      startTime: "09:00"
                      endTime: "17:00"
                    - dayOfWeek: SAT
                      startTime: "10:00"
                      endTime: "14:00"
      responses:
        "200":
          description: Weekly schedule replaced successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/WeeklySchedule"
              examples:
                default:
                  summary: Example replaced weekly schedule
                  value:
                    timezone: Europe/Berlin
                    entries:
                      - dayOfWeek: MON
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: TUE
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: WED
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: THU
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: FRI
                        startTime: "09:00"
                        endTime: "17:00"
                      - dayOfWeek: SAT
                        startTime: "10:00"
                        endTime: "14:00"
        "400":
          description: Bad Request. The request payload is invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                invalidRequest:
                  value:
                    type: "https://api.mira.example/problems/validation-error"
                    title: Bad Request
                    status: 400
                    detail: Request body validation failed
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
                    errors:
                      - field: entries[1].endTime
                        message: must be after startTime
        "401":
          "$ref": "#/components/responses/UnauthorizedError"
          description: Unauthorized. Authentication is required.
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                notOwner:
                  summary: Authenticated user is not the target user
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: Forbidden
                    status: 403
                    detail: "Authenticated user is not allowed to modify this user's schedule"
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
                notProvider:
                  summary: Target user is not a provider
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: Forbidden
                    status: 403
                    detail: Only providers can manage a weekly schedule
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: Not Found
                    status: 404
                    detail: User with the given identifier was not found
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
        "422":
          description: Unprocessable Entity. The request is formally valid but violates one or more business rules.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                overlappingEntries:
                  value:
                    type: "https://api.mira.example/problems/business-rule-violation"
                    title: Unprocessable Entity
                    status: 422
                    detail: Business validation failed
                    instance: /v1/users/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/schedule
                    errors:
                      - field: entries
                        message: overlapping schedule entries are not allowed on the same day
                      - field: timezone
                        message: must be a valid IANA timezone identifier
components:
  securitySchemes:
    bearerHttpAuthentication:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token using a JWT
  parameters:
    AccountIdParam:
      name: accountId
      in: path
      required: true
      description: Account UUID.
      schema:
        type: string
        format: uuid
    UserIdParam:
      name: userId
      in: path
      required: true
      description: User UUID.
      schema:
        type: string
        format: uuid
    CredentialRecordIdParam:
      name: credentialRecordId
      in: path
      required: true
      description: Credential record UUID.
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      required: false
      description: Optional maximum number of items to return when the client requests a paginated response. If omitted, the endpoint may return an unpaginated collection.
      schema:
        type: integer
        minimum: 1
        maximum: 100
    AfterCursorParam:
      name: after
      in: query
      required: false
      description: Optional opaque cursor for fetching the next page of a paginated response. If omitted, the first page or an unpaginated collection is returned.
      schema:
        type: string
    ListingIdParam:
      name: listingId
      in: path
      required: true
      description: Listing UUID.
      schema:
        type: string
        format: uuid
    MediaIdParam:
      name: mediaId
      in: path
      required: true
      description: Media UUID.
      schema:
        type: string
        format: uuid
    BookingIdParam:
      name: bookingId
      in: path
      required: true
      description: Booking UUID.
      schema:
        type: string
        format: uuid
    ProviderIdParam:
      name: providerId
      in: path
      required: true
      description: Provider user UUID.
      schema:
        type: string
        format: uuid
  schemas:
    UpdateUserProfileRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        username:
          "$ref": "#/components/schemas/Username"
        firstName:
          "$ref": "#/components/schemas/FirstName"
        lastName:
          "$ref": "#/components/schemas/LastName"
        bio:
          "$ref": "#/components/schemas/Bio"
        selfSummary:
          "$ref": "#/components/schemas/SelfSummary"
        isPublic:
          type: boolean
          description: Indicates whether the user wants the profile to be publicly visible. A profile is publicly accessible only when isPublic is true and registrationComplete is true.
        primaryAddress:
          "$ref": "#/components/schemas/UserAddressRequest"
    SubmitCredentialRecordRequest:
      type: object
      required:
        - credentialType
        - evidenceMediaId
      additionalProperties: false
      properties:
        credentialType:
          "$ref": "#/components/schemas/CredentialType"
        evidenceMediaId:
          type: string
          format: uuid
          description: Media UUID of the uploaded evidence file.
    UpdateCredentialRecordRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        isVisible:
          type: boolean
          description: Whether the credential should be visible on the public user profile when it is active. Owners and admin accounts may update this field.
        status:
          "$ref": "#/components/schemas/CredentialStatus"
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
          description: Expiration date and time of the credential. Null if the credential does not expire. Admin accounts may update this field. Owners may not update this field through this route.
    AccountResponse:
      type: object
      required:
        - accountId
        - userId
        - authProviders
      properties:
        accountId:
          type: string
          format: uuid
          readOnly: true
          description: Account identifier.
        userId:
          type: string
          format: uuid
          readOnly: true
          description: Identifier of the linked user profile.
        authProviders:
          type: array
          readOnly: true
          description: Authentication providers currently linked to this account.
          items:
            "$ref": "#/components/schemas/AuthProvider"
    AccountCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Account resources.
          items:
            "$ref": "#/components/schemas/AccountResponse"
        page:
          "$ref": "#/components/schemas/CursorPageMetadata"
    PublicUserProfileCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Public user profiles.
          items:
            "$ref": "#/components/schemas/PublicUserProfileResponse"
        page:
          "$ref": "#/components/schemas/CursorPageMetadata"
    PrivateUserProfileCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Private user profiles.
          items:
            "$ref": "#/components/schemas/PrivateUserProfileResponse"
        page:
          "$ref": "#/components/schemas/CursorPageMetadata"
    PublicUserCredentialCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Public credential projections.
          items:
            "$ref": "#/components/schemas/PublicUserCredentialResponse"
    CredentialRecordCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Credential records.
          items:
            "$ref": "#/components/schemas/CredentialRecordResponse"
    BaseUserProfileResponse:
      type: object
      required:
        - userId
        - username
        - firstName
        - lastName
        - bio
        - simplifiedBio
        - selfSummary
        - profileMedia
      properties:
        userId:
          type: string
          format: uuid
          readOnly: true
          description: User profile identifier.
        username:
          "$ref": "#/components/schemas/Username"
        firstName:
          "$ref": "#/components/schemas/FirstName"
        lastName:
          "$ref": "#/components/schemas/LastName"
        bio:
          "$ref": "#/components/schemas/Bio"
        simplifiedBio:
          "$ref": "#/components/schemas/SimplifiedBio"
        selfSummary:
          "$ref": "#/components/schemas/SelfSummary"
        profileMedia:
          oneOf:
            - "$ref": "#/components/schemas/ProfilePicture"
            - type: "null"
    PublicUserProfileResponse:
      allOf:
        - "$ref": "#/components/schemas/BaseUserProfileResponse"
    PrivateUserProfileResponse:
      allOf:
        - "$ref": "#/components/schemas/BaseUserProfileResponse"
        - type: object
          required:
            - registrationComplete
            - isPublic
            - primaryAddress
          properties:
            registrationComplete:
              type: boolean
              readOnly: true
              description: Indicates whether registration/profile setup is complete for this user profile. This value is controlled by backend registration logic and may become true as a side effect of a successful profile update once the profile leaves its shell state.
            isPublic:
              type: boolean
              description: Indicates whether the user wants the profile to be publicly visible. A profile is publicly accessible only when isPublic is true and registrationComplete is true.
            primaryAddress:
              "$ref": "#/components/schemas/UserAddressResponse"
    BaseCredentialResponse:
      type: object
      required:
        - name
        - description
        - expiresAt
      properties:
        name:
          type: string
          readOnly: true
          description: Human readable credential name.
          example: Student
        description:
          type: string
          readOnly: true
          description: Human readable explanation of the credential.
          example: Proof that the user currently holds student status.
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
          readOnly: true
          description: Date and time when the credential expires. Null if the credential does not expire.
    PublicUserCredentialResponse:
      allOf:
        - "$ref": "#/components/schemas/BaseCredentialResponse"
        - type: object
          required:
            - grantedAt
          properties:
            grantedAt:
              type: string
              format: date-time
              readOnly: true
              description: Date and time when the credential became active.
    CredentialRecordResponse:
      allOf:
        - "$ref": "#/components/schemas/BaseCredentialResponse"
        - type: object
          required:
            - credentialRecordId
            - status
            - isVisible
            - evidenceMediaId
            - grantedAt
          properties:
            credentialRecordId:
              type: string
              format: uuid
              readOnly: true
              description: Credential record identifier.
            status:
              "$ref": "#/components/schemas/CredentialStatus"
            isVisible:
              type: boolean
              description: Whether the credential is eligible to appear on the public user profile when active.
            evidenceMediaId:
              type: string
              format: uuid
              readOnly: true
              description: Media identifier of the uploaded evidence file.
            grantedAt:
              type:
                - string
                - "null"
              format: date-time
              readOnly: true
              description: Date and time when the credential became active. Null if the credential has not been granted yet.
    Username:
      type: string
      minLength: 3
      maxLength: 50
      pattern: "^[a-z0-9_]+$"
      description: Public username. Only lowercase letters, numbers, and underscores are allowed.
    FirstName:
      type: string
      minLength: 1
      maxLength: 120
      description: First name. The value must not be blank.
    LastName:
      type: string
      minLength: 1
      maxLength: 120
      description: Last name. The value must not be blank.
    Bio:
      type: string
      maxLength: 2000
      description: Optional profile biography. Empty string means no biography is set.
    SimplifiedBio:
      type:
        - string
        - "null"
      maxLength: 2000
      readOnly: true
      description: Optional AI generated simplified version of the profile biography. Null if it has not been generated yet. This field is output only and cannot be set through user profile update routes.
    SelfSummary:
      type: string
      maxLength: 200
      description: Optional short profile summary. Empty string means no summary is set.
    UserAddressRequest:
      type: object
      required:
        - postalCode
        - city
        - street
        - houseNumber
      additionalProperties: false
      properties:
        postalCode:
          type: string
          pattern: "^[0-9]{5}$"
          description: German postal code.
          example: "95028"
        city:
          type: string
          minLength: 1
          maxLength: 120
          description: City name. The value must not be blank.
          example: Hof
        street:
          type: string
          minLength: 1
          maxLength: 120
          description: Street name. The value must not be blank.
          example: Example Street
        houseNumber:
          type: string
          minLength: 1
          maxLength: 10
          pattern: "^[0-9]+[a-zA-Z]?$"
          description: German house number in simple numeric form with an optional letter.
          example: "12a"
    UserAddressResponse:
      type: object
      required:
        - postalCode
        - city
        - street
        - houseNumber
      properties:
        postalCode:
          type: string
          pattern: "^[0-9]{5}$"
          description: German postal code.
        city:
          type: string
          minLength: 1
          maxLength: 120
          description: City name.
        street:
          type: string
          minLength: 1
          maxLength: 120
          description: Street name.
        houseNumber:
          type: string
          minLength: 1
          maxLength: 10
          pattern: "^[0-9]+[a-zA-Z]?$"
          description: German house number in simple numeric form with an optional letter.
    CursorPageMetadata:
      type: object
      required:
        - limit
        - nextCursor
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
          readOnly: true
          description: Maximum number of items returned.
          example: 20
        nextCursor:
          type:
            - string
            - "null"
          readOnly: true
          description: Cursor for fetching the next page. Null if no next page exists.
          example: null
      description: Pagination metadata returned when a collection response is paginated. Omitted when the response is unpaginated.
    AuthProvider:
      type: string
      description: Authentication provider linked to an account.
      enum:
        - GOOGLE
    CredentialType:
      type: string
      description: Type of credential assigned to a user profile.
      enum:
        - STUDENT
        - ELECTRICIAN
        - PLUMBER
        - TUTOR
    CredentialStatus:
      type: string
      description: Current status of a credential record assigned to a user profile.
      enum:
        - PENDING
        - ACTIVE
        - EXPIRED
        - DENIED
    ServiceTag:
      type: object
      required:
        - tagId
        - name
        - isBarrierefrei
        - isActive
      properties:
        tagId:
          type: string
          format: uuid
          example: dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: Laptop support
        isBarrierefrei:
          type: boolean
          description: Indicates whether this tag belongs to the barrierefrei tag group.
          example: false
        isActive:
          type: boolean
          description: Indicates whether this predefined tag can currently be selected for listings.
          example: true
    ServiceTagCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/ServiceTag"
    CreateListingRequest:
      type: object
      required:
        - tagIds
        - title
        - description
        - price
        - location
      properties:
        tagIds:
          type: array
          minItems: 1
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            format: uuid
          example:
            - dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12
        title:
          type: string
          minLength: 3
          maxLength: 120
          example: Laptop setup and software installation
        description:
          type: string
          minLength: 10
          maxLength: 2000
          example: I help with setting up laptops, installing software, and solving basic PC issues.
        price:
          type: number
          format: double
          minimum: 0
          example: 25.0
        location:
          "$ref": "#/components/schemas/ListingLocationRequest"
    UpdateListingRequest:
      type: object
      minProperties: 1
      properties:
        tagIds:
          type: array
          minItems: 1
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            format: uuid
          example:
            - dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12
        title:
          type: string
          minLength: 3
          maxLength: 120
          example: Laptop setup, software installation, and troubleshooting
        description:
          type: string
          minLength: 10
          maxLength: 2000
          example: I help with setup, installation, troubleshooting, and performance tuning.
        price:
          type: number
          format: double
          minimum: 0
          example: 30.0
        location:
          "$ref": "#/components/schemas/ListingLocationRequest"
    CreateListingReportRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 10
          maxLength: 2000

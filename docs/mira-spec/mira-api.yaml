  "/v1/providers/{providerId}/availability":
    parameters:
      - "$ref": "#/components/parameters/ProviderIdParam"
    get:
      summary: Get provider availability
      description: Returns the provider availability over the requested date range. For each day, returns the working hours envelope and the free windows within it, after applying the recurring weekly schedule and active bookings.
      tags:
        - Bookings
      parameters:
        - name: from
          in: query
          required: true
          description: Inclusive start date of the requested range, in ISO-8601 date format.
          schema:
            type: string
            format: date
            example: "2026-04-01"
        - name: to
          in: query
          required: true
          description: Inclusive end date of the requested range, in ISO-8601 date format. The range may not exceed 31 days.
          schema:
            type: string
            format: date
            example: "2026-04-30"
      responses:
        "200":
          description: Availability retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/ProviderAvailabilityResponse"
              examples:
                default:
                  summary: Example provider availability
                  value:
                    providerId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                    timezone: Europe/Berlin
                    days:
                      - date: "2026-04-27"
                        workingHours:
                          - start: "2026-04-27T07:00:00Z"
                            end: "2026-04-27T15:00:00Z"
                        freeWindows:
                          - start: "2026-04-27T07:00:00Z"
                            end: "2026-04-27T10:00:00Z"
                          - start: "2026-04-27T13:00:00Z"
                            end: "2026-04-27T15:00:00Z"
                      - date: "2026-04-28"
                        workingHours:
                          - start: "2026-04-28T07:00:00Z"
                            end: "2026-04-28T17:00:00Z"
                        freeWindows:
                          - start: "2026-04-28T09:00:00Z"
                            end: "2026-04-28T11:00:00Z"
                          - start: "2026-04-28T12:00:00Z"
                            end: "2026-04-28T16:00:00Z"
                      - date: "2026-04-29"
                        workingHours: []
                        freeWindows: []

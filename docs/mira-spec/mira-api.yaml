openapi: "3.1.0"
info:
  title: Mira API
  version: "1.0.0"
  description: This API describes the backend of Mira, a platform for offering and booking services. It enables users to search for service providers, view service details, manage bookings, communicate with each other, and handle payments and scheduling. The platform is designed to support everyday local services in a simple and accessible way.
servers:
  - url: "http://127.0.0.1:8080"
    description: Local development backend server for the Mira REST API
tags:
  - name: Auth
    description: Placeholder for future authentication resources such as login, logout, and token refresh.
  - name: Accounts
    description: Account data resources.
  - name: Users
    description: Private user profile resources. These routes expose authenticated private profile representations and profile updates. Collection reads are restricted to admin accounts.
  - name: Public User Profiles
    description: Publicly visible user profile projections used for discovery and profile viewing.
  - name: User Credentials
    description: Credential resources attached to user profiles. The /credentials routes expose public credential projections, while /credential-records routes expose the managed credential records used for submission, review, visibility, and deletion.
  - name: Listings (Public)
    description: Public listing discovery resources.
  - name: Listings (Author)
    description: Listing resources managed by listing authors.
  - name: Listings (Reports)
    description: Listing reporting and moderation resources.
  - name: Listings (Media)
    description: Listing media resources.
  - name: Users (Profile Picture)
    description: Profile picture upload and deletion resources.
  - name: Bookings
    description: Booking discovery, request, lifecycle, and delivery confirmation resources.
  - name: Calendar
    description: Calendar views of bookings for authenticated users.
  - name: Schedule
    description: Provider weekly schedule resources used to compute availability.
paths:
  "/v1/accounts":
    get:
      tags:
        - Accounts
      operationId: listAccounts
      summary: List accounts
      description: Returns a cursor-paginated collection of account resources. Access is restricted to admin accounts.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/LimitParam"
        - "$ref": "#/components/parameters/AfterCursorParam"
      responses:
        "200":
          description: Account collection retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/AccountCollectionResponse"
        "400":
          description: Bad Request. One or more query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/accounts/{accountId}":
    get:
      tags:
        - Accounts
      operationId: getAccount
      summary: Get account
      description: Returns the account resource identified by accountId. Access is allowed when the authenticated account owns the target account or is an admin account.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/AccountIdParam"
      responses:
        "200":
          description: Account retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/AccountResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/users":
    get:
      tags:
        - Users
      operationId: listPrivateUserProfiles
      summary: List private user profiles
      description: Returns a cursor-paginated collection of private user profile resources. Access is restricted to admin accounts.
      parameters:
        - name: query
          in: query
          required: false
          description: Free search string matched against private user profile fields such as username, first name, and last name.
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - "$ref": "#/components/parameters/LimitParam"
        - "$ref": "#/components/parameters/AfterCursorParam"
      security:
        - bearerHttpAuthentication: []
      responses:
        "200":
          description: Private user profiles retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PrivateUserProfileCollectionResponse"
        "400":
          description: Bad Request. One or more query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/users/{userId}":
    get:
      tags:
        - Users
      operationId: getPrivateUserProfile
      summary: Get private user profile
      description: Returns the private user profile identified by userId. Access is allowed when the authenticated account owns the target user profile or is an admin account.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Private user profile retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PrivateUserProfileResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
    patch:
      tags:
        - Users
      operationId: updateUserProfile
      summary: Update user profile
      description: Partially updates the user profile identified by userId. Access is allowed when the authenticated account owns the target user profile or is an admin account. The request can update username, firstName, lastName, bio, selfSummary, isPublic, and primaryAddress. Optional text fields use empty strings to represent unset values. simplifiedBio cannot be updated through this route. If primaryAddress is provided, it must be provided as a complete address object. A formally valid address may still be rejected if it cannot be validated as an existing address. This operation may also cause registrationComplete to become true as a backend-controlled side effect when the update provides the data required for the user profile to leave its shell state. registrationComplete cannot be set explicitly in the request payload. Clients can observe the resulting private profile state through GET /v1/users/{userId}.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/UpdateUserProfileRequest"
      responses:
        "200":
          description: User profile updated successfully. The backend may also mark registration as complete as part of the same update if the shell state ends.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PrivateUserProfileResponse"
        "400":
          description: Bad Request. The request payload is invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "409":
          description: Conflict. The request conflicts with the current resource state.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "422":
          description: Unprocessable Entity. The request is formally valid but violates one or more business rules.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/public-user-profiles":
    get:
      tags:
        - Public User Profiles
      operationId: searchPublicUserProfiles
      summary: Search public user profiles
      description: Returns a cursor-paginated collection of public user profiles. A user profile is publicly eligible only when registrationComplete is true and isPublic is true. Incomplete profiles and profiles with public visibility disabled are never included.
      parameters:
        - name: query
          in: query
          required: false
          description: Free search string matched against public user fields such as username, first name, and last name.
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - "$ref": "#/components/parameters/LimitParam"
        - "$ref": "#/components/parameters/AfterCursorParam"
      responses:
        "200":
          description: Public user profiles retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PublicUserProfileCollectionResponse"
        "400":
          description: Bad Request. One or more query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/public-user-profiles/{userId}":
    get:
      tags:
        - Public User Profiles
      operationId: getPublicUserProfile
      summary: Get public user profile
      description: Returns the public user profile identified by userId. A user profile is publicly eligible only when registrationComplete is true and isPublic is true. If the user profile does not exist, registration is incomplete, or public visibility is disabled, no public user profile is returned.
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Public user profile retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PublicUserProfileResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/users/{userId}/credentials":
    get:
      tags:
        - User Credentials
      operationId: listPublicUserCredentials
      summary: List public user credentials
      description: "Returns the public credential projection for the user profile identified by userId. Public credentials are derived from the user's credential records. The parent user profile must be publicly eligible, meaning registrationComplete is true and isPublic is true. Only credential records with status ACTIVE and isVisible set to true are included."
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Public user credentials retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PublicUserCredentialCollectionResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/users/{userId}/credentials/{credentialRecordId}":
    get:
      tags:
        - User Credentials
      operationId: getPublicUserCredential
      summary: Get public user credential
      description: "Returns the public credential projection identified by credentialRecordId for the user profile identified by userId. Public credentials are derived from the user's credential records. The parent user profile must be publicly eligible, meaning registrationComplete is true and isPublic is true. This route returns only credentials with status ACTIVE and isVisible set to true. If the user profile does not exist, is not publicly eligible, the credential record does not belong to the user, or the credential record is not part of the public projection, no public credential is returned."
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
        - "$ref": "#/components/parameters/CredentialRecordIdParam"
      responses:
        "200":
          description: Public user credential retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PublicUserCredentialResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/users/{userId}/credential-records":
    get:
      tags:
        - User Credentials
      operationId: listCredentialRecords
      summary: List credential records
      description: Returns all credential records assigned to the user profile identified by userId. This includes pending, active, expired, denied, and hidden credential records. Access is allowed when the authenticated account owns the target user profile or is an admin account.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Credential records retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/CredentialRecordCollectionResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
    post:
      tags:
        - User Credentials
      operationId: submitCredentialRecord
      summary: Submit credential record
      description: Submits one credential claim for the user profile identified by userId. Access is allowed only when the authenticated account owns the target user profile. The request references a preseeded credential type and one uploaded evidence media file. If accepted, the backend creates a credential record with status PENDING and isVisible set to false.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/SubmitCredentialRecordRequest"
      responses:
        "201":
          description: Credential record submitted successfully.
          headers:
            Location:
              description: URI of the created credential record.
              required: true
              schema:
                type: string
                format: uri-reference
                examples:
                  - /v1/users/223e4567-e89b-12d3-a456-426614174000/credential-records/423e4567-e89b-12d3-a456-426614174000
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/CredentialRecordResponse"
        "400":
          description: Bad Request. The request payload is invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "409":
          description: Conflict. The request conflicts with the current resource state.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/users/{userId}/credential-records/{credentialRecordId}":
    get:
      tags:
        - User Credentials
      operationId: getCredentialRecord
      summary: Get credential record
      description: Returns one credential record assigned to the user profile identified by userId. Access is allowed when the authenticated account owns the target user profile or is an admin account.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
        - "$ref": "#/components/parameters/CredentialRecordIdParam"
      responses:
        "200":
          description: Credential record retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/CredentialRecordResponse"
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
    patch:
      tags:
        - User Credentials
      operationId: updateCredentialRecord
      summary: Update credential record
      description: Partially updates a credential record. Owners may update only isVisible. Admin accounts may additionally update status and expiresAt. The request body may include any allowed subset of these fields. If a request includes any field that the caller is not allowed to update, the request is rejected with 403 Forbidden.
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
        - "$ref": "#/components/parameters/CredentialRecordIdParam"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/UpdateCredentialRecordRequest"
            examples:
              ownerVisibilityUpdate:
                summary: Owner updates credential visibility
                value:
                  isVisible: true
              adminLifecycleUpdate:
                summary: Admin updates all writable credential record fields
                value:
                  isVisible: true
                  status: ACTIVE
                  expiresAt: "2027-12-31T23:59:59Z"
      responses:
        "200":
          description: Credential record updated successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/CredentialRecordResponse"
        "400":
          description: Bad Request. The request payload is invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "409":
          description: Conflict. The request conflicts with the current resource state.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
    delete:
      tags:
        - User Credentials
      operationId: deleteCredentialRecord
      summary: Delete credential record
      description: "Deletes a credential record assigned to the user profile identified by userId. Access is allowed only when the authenticated account owns the target user profile. Admin accounts cannot use this route to delete another user's credential record. Deleting a credential record removes it from the managed credential records collection and from the public credential projection if it was publicly visible."
      security:
        - bearerHttpAuthentication: []
      parameters:
        - "$ref": "#/components/parameters/UserIdParam"
        - "$ref": "#/components/parameters/CredentialRecordIdParam"
      responses:
        "204":
          description: Credential record deleted successfully. No response body is returned.
        "400":
          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized. Authentication is required.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden. The authenticated account is not allowed to access this resource.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
  "/v1/public-listings":
    get:
      summary: List public listings
      description: Returns public listings. A listing is visible in public endpoints only when publicationStatus is ACTIVE and moderationStatus is VISIBLE. The response may be paginated when pagination query parameters are provided.
      tags:
        - Listings (Public)
      parameters:
        - name: tagIds
          in: query
          required: false
          description: Filter listings by one or more predefined service tag UUIDs.
          schema:
            type: array
            items:
              type: string
              format: uuid
        - name: city
          in: query
          required: false
          description: Filter listings by city.
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          description: Minimum price, inclusive.
          schema:
            type: number
            format: double
            minimum: 0
        - name: maxPrice
          in: query
          required: false
          description: Maximum price, inclusive.
          schema:
            type: number
            format: double
            minimum: 0
        - name: userId
          in: query
          required: false
          description: Optional user UUID used to restrict results to listings owned by a public user profile.
          schema:
            type: string
            format: uuid
        - "$ref": "#/components/parameters/LimitParam"
        - "$ref": "#/components/parameters/AfterCursorParam"
      responses:
        "200":
          description: Listings retrieved successfully.
          content:
            "application/json":
              schema:
                "$ref": "#/components/schemas/PublicListingCollectionResponse"
              examples:
                default:
                  summary: Example list of public listings
                  value:
                    items:
                      - listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                        tags:
                          - tagId: dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12
                            name: Laptop support
                            isBarrierefrei: false
                            isActive: true
                        title: Laptop setup and software installation
                        price: 25.0
                        author:
                          name: Anna
                          surname: Schmidt
                        publishedAt: "2026-04-20T13:00:00Z"
                        location:
                          city: Berlin
                          postalCode: "10115"
                          serviceRadiusKm: 15
                        primaryMedia:
                          mediaId: "11111111-2222-3333-4444-555555555555"
                          url: "https://cdn.mira.example/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31/hero.jpg"
                          altText: Open laptop on a wooden desk
                    page:
                      limit: 20
                      nextCursor: null
        "400":
          description: Bad Request. One or more query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                invalidPagination:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: Bad Request
                    status: 400
                    detail: Query parameter validation failed
                    instance: /v1/listings
                    errors:
                      - field: limit
                        message: must be less than or equal to 100
  "/v1/listings":
    post:
      summary: Create a new listing
      description: Creates a draft listing for the authenticated user. The provided location is synchronously validated and geocoded before the listing is created.
      tags:
        - Listings (Author)
      security:
        - bearerHttpAuthentication: []
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              "$ref": "#/components/schemas/CreateListingRequest"
            examples:
              default:
                summary: Example listing creation request
                value:
                  tagIds:
                    - dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12
                  title: Laptop setup and software installation
                  description: I help with setting up laptops, installing software, and solving basic PC issues.
                  price: 25.0
                  location:
                    street: "Hauptstraße"
                    houseNumber: "10"
                    city: Berlin
                    postalCode: "10115"
                    serviceRadiusKm: 15
      responses:
        "201":
          description: Listing created successfully.
          headers:
            Location:
              description: URI of the created listing resource.
              required: true
              schema:
                type: string
                examples:
                  - /v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31
          content:
            "application/json":
              schema:

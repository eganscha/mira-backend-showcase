        - mediaId
        - url
        - mimeType
        - size
        - width
        - height
        - createdAt
      properties:
        mediaId:
          type: string
          format: uuid
          example: "11111111-2222-3333-4444-555555555555"
        url:
          type: string
          format: uri
          example: "https://cdn.mira.example/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31/hero.jpg"
        altText:
          type:
            - string
            - "null"
          example: Open laptop on a wooden desk
        mimeType:
          type: string
          example: image/jpeg
        size:
          type: integer
          format: int64
          minimum: 1
          example: 248576
        width:
          type: integer
          minimum: 1
          example: 1280
        height:
          type: integer
          minimum: 1
          example: 720
        createdAt:
          type: string
          format: date-time
    ListingMediaPreview:
      type: object
      required:
        - mediaId
        - url
      properties:
        mediaId:
          type: string
          format: uuid
          example: "11111111-2222-3333-4444-555555555555"
        url:
          type: string

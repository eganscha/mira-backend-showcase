          description: Bad Request. One or more path or query parameters are invalid.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                invalidRange:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: Bad Request
                    status: 400
                    detail: Query parameter validation failed
                    instance: /v1/providers/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/availability
                    errors:
                      - field: to

          description: Not Found. No resource exists for the given identifier.
          content:
            "application/problem+json":
              schema:
                "$ref": "#/components/schemas/ProblemDetails"
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: Not Found

        - reportId
        - listingId
        - message
        - createdAt
      properties:
        reportId:
          type: string
          format: uuid
          example: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
        listingId:
          type: string
          format: uuid
          example: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        message:
          type: string
          example: This listing contains misleading information and appears to violate platform rules.
        createdAt:
          type: string
          format: date-time
    UploadListingMediaRequest:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          minItems: 1
          maxItems: 10

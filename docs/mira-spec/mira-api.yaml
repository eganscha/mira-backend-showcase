      summary: List calendar bookings of a user
      description: "Returns the user's bookings within the requested date range, regardless of role (consumer or provider). Defaults to bookings in CONFIRMED, PAID, or COMPLETED status; pass the status query parameter to retrieve a single specific status. Results are sorted by bookedStart in ascending order. The userId in the path must match the authenticated user, or the authenticated user must have administrator privileges."
      tags:
        - Calendar
      security:
        - bearerHttpAuthentication: []
      parameters:
        - name: from
          in: query
          required: true
          description: Inclusive start date of the requested range, in ISO-8601 date format.
          schema:
            type: string
            format: date
            example: "2026-05-01"
        - name: to
          in: query
          required: true
          description: Inclusive end date of the requested range, in ISO-8601 date format. The range may not exceed 31 days.
          schema:
            type: string
            format: date
            example: "2026-05-31"
        - name: status
          in: query
          required: false
          description: Filter bookings by a single status. When omitted, returns CONFIRMED, PAID, and COMPLETED bookings together.

              examples:
                invalidPagination:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: "Bad Request"
                    status: 400
                    detail: "Query parameter validation failed"
                    instance: "/v1/users/3fa85f64-5717-4562-b3fc-2c963f66afa6/public-profile/listings"
                    errors:
                      - field: "size"
                        message: "must be less than or equal to 100"
        '404':
          description: User public profile not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "User public profile with the given identifier was not found"
                    instance: "/v1/users/3fa85f64-5717-4562-b3fc-2c963f66afa6/public-profile/listings"

  /v1/users/{userId}/public-profile/listings/{listingId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
      - $ref: '#/components/parameters/ListingIdParam'

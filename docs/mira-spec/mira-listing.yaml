      parameters:
        - name: tagIds
          in: query
          required: false
          description: Filter listings by one or more predefined service tag UUIDs.
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: false
        - name: city
          in: query
          required: false
          description: Filter listings by city.
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          description: Minimum price, inclusive.
          schema:
            type: number
            format: double
            minimum: 0
        - name: maxPrice
          in: query
          required: false
          description: Maximum price, inclusive.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      description: User UUID.
      schema:
        type: string
        format: uuid
    ListingIdParam:
      name: listingId
      in: path
      required: true
      description: Listing UUID.
      schema:
        type: string
        format: uuid
    MediaIdParam:
      name: mediaId
      in: path
      required: true
      description: Media UUID.
      schema:
        type: string
        format: uuid
  responses:
    UnauthorizedError:
      description: Authentication is required.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              value:
                type: "https://api.mira.example/problems/authentication-required"
                title: "Unauthorized"
                status: 401
                detail: "Authentication is required"
                instance: "/v1/listings/{listingId}"
    GeocodingUnavailableError:
      description: Geocoding service is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            geocodingUnavailable:
              value:
                type: "https://api.mira.example/problems/service-unavailable"
                title: "Service Unavailable"
                status: 503
                detail: "Geocoding service is temporarily unavailable"
                instance: "/v1/listings/{listingId}"
  schemas:
    ServiceTag:
      type: object
      required:
        - tagId
        - name
        - isBarrierefrei
        - isActive
      properties:
        tagId:
          type: string
          format: uuid
          examples:
            - "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - "Laptop support"
        isBarrierefrei:
          type: boolean
          description: Indicates whether this tag belongs to the barrierefrei tag group.
          examples:
            - false
        isActive:
          type: boolean
          description: Indicates whether this predefined tag can currently be selected for listings.
          examples:
            - true

    ServiceTagCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceTag'

    CreateListingRequest:
      type: object
      required:
        - tagIds
        - title
        - description
        - price
        - location
      properties:
        tagIds:
          type: array
          minItems: 1
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            format: uuid
          examples:
            - ["dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"]
        title:
          type: string
          minLength: 3
          maxLength: 120
          examples:
            - "Laptop setup and software installation"
        description:
          type: string
          minLength: 10
          maxLength: 2000
          examples:
            - "I help with setting up laptops, installing software, and solving basic PC issues."
        price:
          type: number
          format: double
          minimum: 0
          examples:
            - 25.0
        location:
          $ref: '#/components/schemas/ListingLocationRequest'

    UpdateListingRequest:

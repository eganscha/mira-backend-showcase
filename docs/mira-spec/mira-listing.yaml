openapi: 3.1.0
info:
  title: Mira OpenAPI Spec
  version: v1
  description: >
    This API describes the backend of Mira, a platform for offering and booking services.
    It enables users to search for service providers, view service details, manage bookings,
    communicate with each other, and handle payments and scheduling.
    The platform is designed to support everyday local services in a simple and accessible way.

servers:
  - url: http://127.0.0.1:8081
    description: Local development server for the Mira REST API

paths:
  /v1/service-tags:
    get:
      summary: List service tags
      description: Returns the predefined service tags that can be assigned to listings.
      tags:
        - Listings (Public)
      responses:
        '200':
          description: Service tags retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTagCollectionResponse'
              examples:
                default:
                  summary: Example service tags
                  value:
                    items:
                      - tagId: "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                        name: "Laptop support"
                        isBarrierefrei: false
                        isActive: true
                      - tagId: "5f5b9e3a-0c7c-45f4-9d8d-59f1d15a2a77"
                        name: "Wheelchair accessible"
                        isBarrierefrei: true
                        isActive: true

  /v1/listings:
    get:
      summary: List public listings
      description: Returns a paginated list of publicly visible listings. A listing is visible in public endpoints only when publicationStatus is ACTIVE and moderationStatus is VISIBLE.
      tags:
        - Listings (Public)
      parameters:
        - name: tagIds
          in: query
          required: false
          description: Filter listings by one or more predefined service tag UUIDs.
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: false

        - name: city
          in: query
          required: false
          description: Filter listings by city.
          schema:
            type: string

        - name: minPrice
          in: query
          required: false
          description: Minimum price, inclusive.
          schema:
            type: number
            format: double
            minimum: 0

        - name: maxPrice
          in: query
          required: false
          description: Maximum price, inclusive.
          schema:
            type: number
            format: double
            minimum: 0

        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            minimum: 0
            default: 0

        - name: size
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

      responses:
        '200':
          description: Listings retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicListingCollectionResponse'
              examples:
                default:
                  summary: Example list of public listings
                  value:
                    items:
                      - listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                        tags:
                          - tagId: "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                            name: "Laptop support"
                            isBarrierefrei: false
                            isActive: true
                        title: "Laptop setup and software installation"
                        price: 25.0
                        author:
                          name: "Anna"
                          surname: "Schmidt"
                        publishedAt: "2026-04-20T13:00:00Z"
                        location:
                          city: "Berlin"
                          postalCode: "10115"
                          serviceRadiusKm: 15
                        primaryMedia:
                          mediaId: "11111111-2222-3333-4444-555555555555"
                          url: "https://cdn.mira.example/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31/hero.jpg"
                          altText: "Open laptop on a wooden desk"
                    page:
                      page: 0
                      size: 20
                      totalElements: 1
                      totalPages: 1
        '400':
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidPagination:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: "Bad Request"
                    status: 400
                    detail: "Query parameter validation failed"
                    instance: "/v1/listings"
                    errors:
                      - field: "size"
                        message: "must be less than or equal to 100"

    post:
      summary: Create a new listing
      description: Creates a draft listing for the authenticated user. The provided location is synchronously validated and geocoded before the listing is created.
      tags:
        - Listings (Author)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListingRequest'
            examples:
              default:
                summary: Example listing creation request
                value:
                  tagIds:
                    - "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                  title: "Laptop setup and software installation"
                  description: "I help with setting up laptops, installing software, and solving basic PC issues."
                  price: 25.0
                  location:
                    street: "Hauptstraße"
                    houseNumber: "10"
                    city: "Berlin"
                    postalCode: "10115"
                    serviceRadiusKm: 15
      responses:
        '201':
          description: Listing created successfully.
          headers:
            Location:
              description: URI of the created listing resource.
              required: true
              schema:
                type: string
                examples:
                  - "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetails'
              examples:
                default:
                  summary: Example created listing
                  value:
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    tags:
                      - tagId: "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                        name: "Laptop support"
                        isBarrierefrei: false
                        isActive: true
                    title: "Laptop setup and software installation"
                    description: "I help with setting up laptops, installing software, and solving basic PC issues."
                    price: 25.0
                    publicationStatus: "DRAFT"
                    moderationStatus: "VISIBLE"
                    author:
                      name: "Anna"
                      surname: "Schmidt"
                    createdAt: "2026-04-20T12:00:00Z"
                    updatedAt: "2026-04-20T12:00:00Z"
                    publishedAt: null
                    location:
                      city: "Berlin"
                      postalCode: "10115"
                      serviceRadiusKm: 15
                    media: []

        '400':
          description: Invalid request payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidRequest:
                  value:
                    type: "https://api.mira.example/problems/validation-error"
                    title: "Bad Request"
                    status: 400
                    detail: "Request body validation failed"
                    instance: "/v1/listings"
                    errors:
                      - field: "title"
                        message: "must not be blank"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to create listings.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "Authenticated user is not allowed to create listings"
                    instance: "/v1/listings"
        '422':
          description: Business validation failed, including addresses that cannot be geocoded.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                businessValidation:
                  value:
                    type: "https://api.mira.example/problems/business-rule-violation"
                    title: "Unprocessable Entity"
                    status: 422
                    detail: "Business validation failed"
                    instance: "/v1/listings"
                    errors:
                      - field: "tagIds"
                        message: "one or more selected tags are not available for listing creation"
                      - field: "location"
                        message: "the provided address could not be geocoded"
        '503':
          $ref: '#/components/responses/GeocodingUnavailableError'

  /v1/listings/{listingId}:
    parameters:
      - $ref: '#/components/parameters/ListingIdParam'
    get:
      summary: Get listing details
      description: Returns a publicly visible listing by its identifier. A listing is visible in public endpoints only when publicationStatus is ACTIVE and moderationStatus is VISIBLE. Listings in other combinations are returned as not found.
      tags:
        - Listings (Public)
      responses:
        '200':
          description: Listing retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicListingDetails'
              examples:
                default:
                  summary: Example listing details
                  value:
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    tags:
                      - tagId: "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                        name: "Laptop support"
                        isBarrierefrei: false
                        isActive: true
                    title: "Laptop setup and software installation"
                    description: "I help with setting up laptops, installing software, and solving basic PC issues."
                    price: 25.0
                    publicationStatus: "ACTIVE"
                    author:
                      name: "Anna"
                      surname: "Schmidt"
                    createdAt: "2026-04-20T12:00:00Z"
                    updatedAt: "2026-04-20T13:00:00Z"
                    publishedAt: "2026-04-20T13:00:00Z"
                    location:
                      city: "Berlin"
                      postalCode: "10115"
                      serviceRadiusKm: 15
                    media:
                      - mediaId: "11111111-2222-3333-4444-555555555555"
                        url: "https://cdn.mira.example/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31/hero.jpg"
                        altText: "Open laptop on a wooden desk"
                        mimeType: "image/jpeg"
                        size: 248576
                        width: 1280
                        height: 720
                        createdAt: "2026-04-20T16:10:00Z"
        '404':
          description: Listing not found or not publicly visible.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Listing with the given identifier was not found"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"

    patch:
      summary: Update listing
      description: Partially updates mutable fields of a listing owned by the authenticated user. Only the fields provided in the request body are changed. If the location is changed, it is synchronously validated and geocoded before the listing is updated.
      tags:
        - Listings (Author)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListingRequest'
            examples:
              default:
                summary: Example listing update request
                value:
                  title: "Laptop setup, software installation, and troubleshooting"
                  price: 30.0
                  location:
                    street: "Hauptstraße"
                    houseNumber: "10"
                    city: "Berlin"
                    postalCode: "10115"
                    serviceRadiusKm: 20
      responses:
        '200':
          description: Listing updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetails'
              examples:
                default:
                  summary: Example updated listing
                  value:
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    tags:
                      - tagId: "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                        name: "Laptop support"
                        isBarrierefrei: false
                        isActive: true
                    title: "Laptop setup, software installation, and troubleshooting"
                    description: "I help with setting up laptops, installing software, and solving basic PC issues."
                    price: 30.0
                    publicationStatus: "DRAFT"
                    moderationStatus: "VISIBLE"
                    author:
                      name: "Anna"
                      surname: "Schmidt"
                    createdAt: "2026-04-20T12:00:00Z"
                    updatedAt: "2026-04-20T14:00:00Z"
                    publishedAt: null
                    location:
                      city: "Berlin"
                      postalCode: "10115"
                      serviceRadiusKm: 20
                    media: []
        '400':
          description: Invalid request payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidRequest:
                  value:
                    type: "https://api.mira.example/problems/validation-error"
                    title: "Bad Request"
                    status: 400
                    detail: "Request body validation failed"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    errors:
                      - field: "price"
                        message: "must be greater than or equal to 0"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to update this listing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "Authenticated user is not allowed to update this listing"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        '404':
          description: Listing not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Listing with the given identifier was not found"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        '409':
          description: Conflict with the current state of the target resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                conflict:
                  value:
                    type: "https://api.mira.example/problems/resource-conflict"
                    title: "Conflict"
                    status: 409
                    detail: "Paused or deleted listings cannot be updated"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        '422':
          description: Business validation failed, including addresses that cannot be geocoded.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                businessValidation:
                  value:
                    type: "https://api.mira.example/problems/business-rule-violation"
                    title: "Unprocessable Entity"
                    status: 422
                    detail: "Business validation failed"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    errors:
                      - field: "location"
                        message: "the provided address could not be geocoded"
        '503':
          $ref: '#/components/responses/GeocodingUnavailableError'

    delete:
      summary: Delete listing
      description: Soft-deletes a listing owned by the authenticated user. Deleted listings are no longer accessible through public endpoints.
      tags:
        - Listings (Author)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListingIdParam'
      responses:
        '204':
          description: Listing deleted successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to delete this listing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "Authenticated user is not allowed to delete this listing"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        '404':
          description: Listing not found or already deleted.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Listing with the given identifier was not found or has already been deleted"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        '409':
          description: Conflict with the current state of the target resource.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                activeBookings:
                  value:
                    type: "https://api.mira.example/problems/resource-conflict"
                    title: "Conflict"
                    status: 409
                    detail: "Listings with active bookings cannot be deleted"
                    instance: "/v1/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"

  /v1/users/{userId}/public-profile/listings:

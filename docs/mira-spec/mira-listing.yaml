                    location:
                      city: "Berlin"
                      postalCode: "10115"
                      serviceRadiusKm: 15
                    media:
                      - mediaId: "11111111-2222-3333-4444-555555555555"
                        url: "https://cdn.mira.example/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31/hero.jpg"
                        altText: "Open laptop on a wooden desk"
                        mimeType: "image/jpeg"
                        size: 248576
                        width: 1280
                        height: 720
                        createdAt: "2026-04-20T16:10:00Z"
        '404':
          description: User public profile or listing not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "User public profile or listing with the given identifier was not found"
                    instance: "/v1/users/3fa85f64-5717-4562-b3fc-2c963f66afa6/public-profile/listings/9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"

  /v1/users/{userId}/listings:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    get:
      summary: List user's listings
      description: Returns a paginated list of listings owned by the specified user, including draft, active, paused, and deleted listings. This endpoint is accessible only when userId matches the authenticated user.
      tags:
        - Listings (Author)
      security:
        - bearerAuth: []
      parameters:
        - name: publicationStatus
          in: query
          required: false
          description: Filter listings by publication status.
          schema:
            $ref: '#/components/schemas/PublicationStatus'
        - name: tagIds
          in: query
          required: false
          description: Filter listings by one or more predefined service tag UUIDs.
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: false
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Listings retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyListingCollectionResponse'

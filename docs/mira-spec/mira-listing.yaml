      tags:
        - Listings (Public)
      responses:
        '200':
          description: User public profile listing retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicListingDetails'
              examples:
                default:
                  summary: Example public profile listing details
                  value:
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    tags:
                      - tagId: "dcf4f0b6-a983-4d88-a4d3-d8d4bd6a7b12"
                        name: "Laptop support"
                        isBarrierefrei: false
                        isActive: true
                    title: "Laptop setup and software installation"
                    description: "I help with setting up laptops, installing software, and solving basic PC issues."
                    price: 25.0
                    publicationStatus: "ACTIVE"
                    author:
                      name: "Anna"

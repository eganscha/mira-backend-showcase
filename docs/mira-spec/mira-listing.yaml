    ListingLocationRequest:
      type: object
      required:
        - street
        - houseNumber
        - city
        - postalCode
        - serviceRadiusKm
      properties:
        street:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - "Hauptstraße"
        houseNumber:
          type: string
          minLength: 1
          maxLength: 20
          examples:
            - "10"
        city:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - "Berlin"
        postalCode:
          type: string
          pattern: '^\d{5}$'
          description: German postal code as exactly five digits.
          examples:
            - "10115"
        serviceRadiusKm:
          type: integer
          minimum: 1
          examples:
            - 15

    PublicListingLocation:
      type: object
      required:

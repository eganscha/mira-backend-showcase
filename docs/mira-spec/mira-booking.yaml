openapi: 3.1.0
info:
  title: Mira OpenAPI Spec
  version: v1
  description: >
    This API describes the booking subsystem of Mira, a platform for offering and booking services.
    It enables consumers to discover provider availability, request bookings against published listings, providers to accept or refuse those requests, and both parties to track the booking lifecycle from request through completion. 

servers:
  - url: http://127.0.0.1:8080
    description: Local development server for the Mira REST API

paths:
  /v1/providers/{providerId}/availability:
    parameters:
      - $ref: '#/components/parameters/ProviderIdParam'
    get:
      summary: Get provider availability
      description: >
        Returns the provider's computed availability over the requested date range. For each day, returns the working hours envelope and the free windows within it, after applying schedule exceptions and active bookings.
      tags:
        - Bookings
      parameters:
        - name: from
          in: query
          required: true
          description: Inclusive start date of the requested range, in ISO-8601 date format.
          schema:
            type: string
            format: date
            example: "2026-04-01"
        - name: to
          in: query
          required: true
          description: Inclusive end date of the requested range, in ISO-8601 date format. The range may not exceed 31 days.
          schema:
            type: string
            format: date
            example: "2026-04-30"
      responses:
        '200':
          description: Availability retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderAvailabilityResponse'
              examples:
                default:
                  summary: Example provider availability
                  value:
                    providerId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                    timezone: "Europe/Berlin"
                    days:
                      - date: "2026-04-27"
                        workingHours:
                          - start: "2026-04-27T07:00:00Z"
                            end: "2026-04-27T15:00:00Z"
                        freeWindows:
                          - start: "2026-04-27T07:00:00Z"
                            end: "2026-04-27T10:00:00Z"
                          - start: "2026-04-27T13:00:00Z"
                            end: "2026-04-27T15:00:00Z"
                      - date: "2026-04-28"
                        workingHours:
                          - start: "2026-04-28T07:00:00Z"
                            end: "2026-04-28T17:00:00Z"
                        freeWindows:
                          - start: "2026-04-28T09:00:00Z"
                            end: "2026-04-28T11:00:00Z"
                          - start: "2026-04-28T12:00:00Z"
                            end: "2026-04-28T16:00:00Z"
                      - date: "2026-04-29"
                        workingHours: []
                        freeWindows: []
        '400':
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidRange:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: "Bad Request"
                    status: 400
                    detail: "Query parameter validation failed"
                    instance: "/v1/providers/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/availability"
                    errors:
                      - field: "to"
                        message: "must not be more than 31 days after 'from'"
        '404':
          description: Provider not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Provider with the given identifier was not found"
                    instance: "/v1/providers/22bb22bb-2222-2222-2222-bbbbbbbbbbbb/availability"

  /v1/bookings:
    post:
      summary: Create a booking
      description: >
        Creates a booking request for a published listing on behalf of the authenticated consumer. The booking is created with status PENDING and must be accepted by the provider before payment.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
            examples:
              default:
                summary: Example booking creation request
                value:
                  listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                  bookedStart: "2026-05-05T14:00:00Z"
                  durationHours: 1.5
                  locationType: "AT_CONSUMER"
                  description: "Need help installing Office and migrating files from an old laptop. Two devices total."
      responses:
        '201':
          description: Booking created successfully.
          headers:
            Location:
              description: URI of the created booking resource.
              required: true
              schema:
                type: string
                example: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetails'
              examples:
                default:
                  summary: Example created booking
                  value:
                    bookingId: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    listing:
                      title: "Laptop setup and software installation"
                    consumer:
                      userId: "11aa11aa-1111-1111-1111-aaaaaaaaaaaa"
                      name: "Marija"
                      surname: "Volodermann"
                    provider:
                      userId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                      name: "Anna"
                      surname: "Schmidt"
                    status: "PENDING"
                    locationType: "AT_CONSUMER"
                    serviceAddress:
                      street: "Brunnenstraße"
                      houseNumber: "25"
                      city: "Berlin"
                      postalCode: "10119"
                    description: "Need help installing Office and migrating files from an old laptop. Two devices total."
                    totalPrice: 37.50
                    bookedStart: "2026-05-05T14:00:00Z"
                    bookedEnd: "2026-05-05T15:30:00Z"
                    durationHours: 1.5
                    createdAt: "2026-04-28T10:00:00Z"
                    confirmedAt: null
                    completedAt: null
                    providerCompletedAt: null
                    consumerConfirmedAt: null
                    consumerConfirmationType: null
                    autoConfirmAt: null
                    cancelledAt: null
                    expiresAt: null
        '400':
          description: Invalid request payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidRequest:
                  value:
                    type: "https://api.mira.example/problems/validation-error"
                    title: "Bad Request"
                    status: 400
                    detail: "Request body validation failed"
                    instance: "/v1/bookings"
                    errors:
                      - field: "durationHours"
                        message: "must be a multiple of 0.5"
                      - field: "bookedStart"
                        message: "must be a future date-time"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to create this booking.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                selfBooking:
                  summary: Consumer is the listing's author
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "A user cannot book their own listing"
                    instance: "/v1/bookings"
        '404':
          description: Listing not found or not publicly visible.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Listing with the given identifier was not found"
                    instance: "/v1/bookings"
        '409':
          description: The requested time window is no longer available.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                slotTaken:
                  value:
                    type: "https://api.mira.example/problems/resource-conflict"
                    title: "Conflict"
                    status: 409
                    detail: "The requested time window is no longer available"
                    instance: "/v1/bookings"
        '422':
          description: Business validation failed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                listingNotActive:
                  value:
                    type: "https://api.mira.example/problems/business-rule-violation"
                    title: "Unprocessable Entity"
                    status: 422
                    detail: "Business validation failed"
                    instance: "/v1/bookings"
                    errors:
                      - field: "listingId"
                        message: "listing is not currently accepting bookings"
                      - field: "bookedStart"
                        message: "the requested time falls outside the provider's available hours"

  /v1/bookings/{bookingId}:
    parameters:
      - $ref: '#/components/parameters/BookingIdParam'
    get:
      summary: Get booking details
      description: >
        Returns the full details of a booking. Only visible to the consumer who created it and the provider whose listing was booked.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Booking retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetails'
              examples:
                default:
                  summary: Example booking details
                  value:
                    bookingId: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    listing:
                      title: "Laptop setup and software installation"
                    consumer:
                      userId: "11aa11aa-1111-1111-1111-aaaaaaaaaaaa"
                      name: "Marija"
                      surname: "Volodermann"
                    provider:
                      userId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                      name: "Anna"
                      surname: "Schmidt"
                    status: "CONFIRMED"
                    locationType: "AT_CONSUMER"
                    serviceAddress:
                      street: "Brunnenstraße"
                      houseNumber: "25"
                      city: "Berlin"
                      postalCode: "10119"
                    description: "Need help installing Office and migrating files from an old laptop. Two devices total."
                    totalPrice: 37.50
                    bookedStart: "2026-05-05T14:00:00Z"
                    bookedEnd: "2026-05-05T15:30:00Z"
                    durationHours: 1.5
                    createdAt: "2026-04-28T10:00:00Z"
                    confirmedAt: "2026-04-28T10:30:00Z"
                    completedAt: null
                    providerCompletedAt: null
                    consumerConfirmedAt: null
                    consumerConfirmationType: null
                    autoConfirmAt: null
                    cancelledAt: null
                    expiresAt: "2026-04-30T10:30:00Z"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Booking not found or not visible to the authenticated user.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Booking with the given identifier was not found"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"

    delete:
      summary: Cancel booking
      description: >
        Cancels a booking on behalf of the authenticated consumer. Only allowed while the booking is PENDING, CONFIRMED, or PAID, before delivery acknowledgement begins. The record is retained with status CANCELLED.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Booking cancelled successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to cancel this booking.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "Authenticated user is not allowed to cancel this booking"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
        '404':
          description: Booking not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Booking with the given identifier was not found"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
        '409':
          description: Conflict with the current state of the booking.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidState:
                  value:
                    type: "https://api.mira.example/problems/resource-conflict"
                    title: "Conflict"
                    status: 409
                    detail: "Only pending, confirmed, or paid bookings can be cancelled before delivery acknowledgement begins"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"

  /v1/me/bookings:
    get:
      summary: List my bookings
      description: >
        Returns a cursor-paginated list of bookings created by the authenticated user as a consumer, sorted by bookedStart in descending order.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter bookings by status.
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/AfterCursorParam'
      responses:
        '200':
          description: Bookings retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCollectionResponse'
              examples:
                default:
                  summary: Example list of my bookings
                  value:
                    items:
                      - bookingId: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
                        listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                        listing:
                          title: "Laptop setup and software installation"
                        counterparty:
                          userId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                          name: "Anna"
                          surname: "Schmidt"
                        status: "CONFIRMED"
                        locationType: "AT_CONSUMER"
                        serviceAddress:
                          street: "Brunnenstraße"
                          houseNumber: "25"
                          city: "Berlin"
                          postalCode: "10119"
                        totalPrice: 37.50
                        bookedStart: "2026-05-05T14:00:00Z"
                        bookedEnd: "2026-05-05T15:30:00Z"
                        durationHours: 1.5
                        createdAt: "2026-04-28T10:00:00Z"
                    page:
                      limit: 20
                      nextCursor: null
        '400':
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidPagination:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: "Bad Request"
                    status: 400
                    detail: "Query parameter validation failed"
                    instance: "/v1/me/bookings"
                    errors:
                      - field: "limit"
                        message: "must be less than or equal to 100"
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/me/incoming-bookings:
    get:
      summary: List incoming bookings
      description: >
        Returns a cursor-paginated list of bookings made against listings owned by the authenticated user. Defaults to PENDING; use the status query parameter to retrieve other states.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter bookings by status. Defaults to PENDING when omitted.
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/AfterCursorParam'
      responses:
        '200':
          description: Bookings retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCollectionResponse'
              examples:
                default:
                  summary: Example list of incoming bookings
                  value:
                    items:
                      - bookingId: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
                        listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                        listing:
                          title: "Laptop setup and software installation"
                        counterparty:
                          userId: "11aa11aa-1111-1111-1111-aaaaaaaaaaaa"
                          name: "Marija"
                          surname: "Volodermann"
                        status: "PENDING"
                        locationType: "AT_CONSUMER"
                        serviceAddress:
                          street: "Brunnenstraße"
                          houseNumber: "25"
                          city: "Berlin"
                          postalCode: "10119"
                        totalPrice: 37.50
                        bookedStart: "2026-05-05T14:00:00Z"
                        bookedEnd: "2026-05-05T15:30:00Z"
                        durationHours: 1.5
                        createdAt: "2026-04-28T10:00:00Z"
                    page:
                      limit: 20
                      nextCursor: null
        '400':
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidPagination:
                  value:
                    type: "https://api.mira.example/problems/invalid-query-parameter"
                    title: "Bad Request"
                    status: 400
                    detail: "Query parameter validation failed"
                    instance: "/v1/me/incoming-bookings"
                    errors:
                      - field: "limit"
                        message: "must be less than or equal to 100"
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/bookings/{bookingId}/accept:
    parameters:
      - $ref: '#/components/parameters/BookingIdParam'
    post:
      summary: Accept booking
      description: >
        Accepts a pending booking as the provider. Transitions PENDING to CONFIRMED and sets an expiration deadline for payment.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Booking accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetails'
              examples:
                default:
                  summary: Example accepted booking
                  value:
                    bookingId: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    listing:
                      title: "Laptop setup and software installation"
                    consumer:
                      userId: "11aa11aa-1111-1111-1111-aaaaaaaaaaaa"
                      name: "Marija"
                      surname: "Volodermann"
                    provider:
                      userId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                      name: "Anna"
                      surname: "Schmidt"
                    status: "CONFIRMED"
                    locationType: "AT_CONSUMER"
                    serviceAddress:
                      street: "Brunnenstraße"
                      houseNumber: "25"
                      city: "Berlin"
                      postalCode: "10119"
                    description: "Need help installing Office and migrating files from an old laptop. Two devices total."
                    totalPrice: 37.50
                    bookedStart: "2026-05-05T14:00:00Z"
                    bookedEnd: "2026-05-05T15:30:00Z"
                    durationHours: 1.5
                    createdAt: "2026-04-28T10:00:00Z"
                    confirmedAt: "2026-04-28T10:30:00Z"
                    completedAt: null
                    providerCompletedAt: null
                    consumerConfirmedAt: null
                    consumerConfirmationType: null
                    autoConfirmAt: null
                    cancelledAt: null
                    expiresAt: "2026-04-30T10:30:00Z"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to accept this booking.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "Authenticated user is not allowed to accept this booking"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/accept"
        '404':
          description: Booking not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Booking with the given identifier was not found"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/accept"
        '409':
          description: Conflict with the current state of the booking.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidState:
                  value:
                    type: "https://api.mira.example/problems/resource-conflict"
                    title: "Conflict"
                    status: 409
                    detail: "Only pending bookings can be accepted"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/accept"

  /v1/bookings/{bookingId}/refuse:
    parameters:
      - $ref: '#/components/parameters/BookingIdParam'
    post:
      summary: Refuse booking
      description: >
        Refuses a pending booking as the provider. Transitions PENDING to REFUSED, with an optional reason message shared with the consumer.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefuseBookingRequest'
            examples:
              default:
                summary: Example refusal request
                value:
                  reason: "I am fully booked that afternoon. Please try a different time."
      responses:
        '200':
          description: Booking refused successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetails'
              examples:
                default:
                  summary: Example refused booking
                  value:
                    bookingId: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
                    listingId: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
                    listing:
                      title: "Laptop setup and software installation"
                    consumer:
                      userId: "11aa11aa-1111-1111-1111-aaaaaaaaaaaa"
                      name: "Marija"
                      surname: "Volodermann"
                    provider:
                      userId: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
                      name: "Anna"
                      surname: "Schmidt"
                    status: "REFUSED"
                    locationType: "AT_CONSUMER"
                    serviceAddress:
                      street: "Brunnenstraße"
                      houseNumber: "25"
                      city: "Berlin"
                      postalCode: "10119"
                    description: "Need help installing Office and migrating files from an old laptop. Two devices total."
                    totalPrice: 37.50
                    bookedStart: "2026-05-05T14:00:00Z"
                    bookedEnd: "2026-05-05T15:30:00Z"
                    durationHours: 1.5
                    createdAt: "2026-04-28T10:00:00Z"
                    confirmedAt: null
                    completedAt: null
                    providerCompletedAt: null
                    consumerConfirmedAt: null
                    consumerConfirmationType: null
                    autoConfirmAt: null
                    cancelledAt: "2026-04-28T10:32:00Z"
                    expiresAt: null
        '400':
          description: Invalid request payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidRequest:
                  value:
                    type: "https://api.mira.example/problems/validation-error"
                    title: "Bad Request"
                    status: 400
                    detail: "Request body validation failed"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/refuse"
                    errors:
                      - field: "reason"
                        message: "must not exceed 500 characters"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Authenticated user is not allowed to refuse this booking.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
                    type: "https://api.mira.example/problems/insufficient-permissions"
                    title: "Forbidden"
                    status: 403
                    detail: "Authenticated user is not allowed to refuse this booking"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/refuse"
        '404':
          description: Booking not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                notFound:
                  value:
                    type: "https://api.mira.example/problems/resource-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "Booking with the given identifier was not found"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/refuse"
        '409':
          description: Conflict with the current state of the booking.
          content:

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by the Mira authentication service.

  parameters:
    BookingIdParam:
      name: bookingId
      in: path
      required: true
      description: Booking UUID.
      schema:
        type: string
        format: uuid
    ProviderIdParam:
      name: providerId
      in: path
      required: true
      description: Provider user UUID.
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Defaults to 20 when omitted.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AfterCursorParam:
      name: after
      in: query
      required: false
      description: >
        Opaque cursor for fetching the next page. If omitted, the first page is returned.
      schema:
        type: string

  responses:
    UnauthorizedError:
      description: Authentication is required.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              value:
                type: "https://api.mira.example/problems/authentication-required"
                title: "Unauthorized"
                status: 401
                detail: "Authentication is required"
                instance: "/v1/bookings/{bookingId}"

  schemas:
    CreateBookingRequest:
      type: object
      required:
        - listingId
        - bookedStart
        - durationHours
        - locationType
        - description
      properties:
        listingId:
          type: string
          format: uuid
          description: Identifier of the listing being booked. The provider is derived from the listing's author.
          example: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        bookedStart:
          type: string
          format: date-time
          description: ISO-8601 start of the requested service window. Must be a future date-time.
          example: "2026-05-05T14:00:00Z"
        durationHours:
          type: number
          format: double
          minimum: 0.5
          maximum: 12
          multipleOf: 0.5
          description: Length of the requested service window in hours. Must be a multiple of 0.5.
          example: 1.5
        locationType:
          $ref: '#/components/schemas/LocationType'
        description:
          type: string
          minLength: 10
          maxLength: 2000
          description: Free-text description of the requested service, provided by the consumer.
          example: "Need help installing Office and migrating files from an old laptop. Two devices total."

    RefuseBookingRequest:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: Optional message from the provider explaining why the booking was refused.
          example: "I am fully booked that afternoon. Please try a different time."

    BookingSummary:
      type: object
      required:
        - bookingId
        - listingId
        - listing
        - counterparty
        - status
        - locationType
        - serviceAddress
        - totalPrice
        - bookedStart
        - bookedEnd
        - durationHours
        - createdAt
      properties:
        bookingId:
          type: string
          format: uuid
          example: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
        listingId:
          type: string
          format: uuid
          example: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        listing:
          $ref: '#/components/schemas/BookingListingPreview'
        counterparty:
          $ref: '#/components/schemas/BookingParticipant'
          description: >
            The other party on this booking, relative to the authenticated user. For consumers, this is the
            provider. For providers, this is the consumer.
        status:
          $ref: '#/components/schemas/BookingStatus'
        locationType:
          $ref: '#/components/schemas/LocationType'
        serviceAddress:
          oneOf:
            - $ref: '#/components/schemas/BookingServiceAddress'
            - type: "null"
          description: >
            The address where the service will take place, resolved from locationType: AT_CONSUMER returns the
            consumer's private address, AT_PROVIDER returns the listing's address, and REMOTE returns null.
        totalPrice:
          type: number
          format: double
          minimum: 0
          example: 37.50
        bookedStart:
          type: string
          format: date-time
          example: "2026-05-05T14:00:00Z"
        bookedEnd:
          type: string
          format: date-time
          example: "2026-05-05T15:30:00Z"
        durationHours:
          type: number
          format: double
          example: 1.5
        createdAt:
          type: string
          format: date-time

    BookingDetails:
      type: object
      required:
        - bookingId
        - listingId
        - listing
        - consumer
        - provider
        - status
        - locationType
        - serviceAddress
        - description
        - totalPrice
        - bookedStart
        - bookedEnd
        - durationHours
        - createdAt
        - confirmedAt
        - completedAt
        - providerCompletedAt
        - consumerConfirmedAt
        - consumerConfirmationType
        - autoConfirmAt
        - cancelledAt
        - expiresAt
      properties:
        bookingId:
          type: string
          format: uuid
          example: "3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10"
        listingId:
          type: string
          format: uuid
          example: "9c2de8a5-0e11-4fca-95fc-6852ac6f4b31"
        listing:
          $ref: '#/components/schemas/BookingListingPreview'
        consumer:
          $ref: '#/components/schemas/BookingParticipant'
        provider:
          $ref: '#/components/schemas/BookingParticipant'
        status:
          $ref: '#/components/schemas/BookingStatus'
        locationType:
          $ref: '#/components/schemas/LocationType'
        serviceAddress:
          oneOf:
            - $ref: '#/components/schemas/BookingServiceAddress'
            - type: "null"
          description: >
            The address where the service will take place, resolved from locationType: AT_CONSUMER returns the
            consumer's private address, AT_PROVIDER returns the listing's address, and REMOTE returns null.
        description:
          type: string
          example: "Need help installing Office and migrating files from an old laptop. Two devices total."
        totalPrice:
          type: number
          format: double
          minimum: 0
          description: Snapshot of the booking's total price at the time of creation.
          example: 37.50
        bookedStart:
          type: string
          format: date-time
          example: "2026-05-05T14:00:00Z"
        bookedEnd:
          type: string
          format: date-time
          example: "2026-05-05T15:30:00Z"
        durationHours:
          type: number
          format: double
          example: 1.5
        createdAt:
          type: string
          format: date-time
        confirmedAt:
          type:
            - string
            - "null"
          format: date-time
          description: Set when the provider accepts the booking.
        completedAt:
          type:
            - string
            - "null"
          format: date-time
          description: Set when the booking reaches its final completed state.
        providerCompletedAt:
          type:
            - string
            - "null"
          format: date-time
          description: Set when the provider explicitly marks the service as delivered.
        consumerConfirmedAt:
          type:
            - string
            - "null"
          format: date-time
          description: Set when the consumer explicitly acknowledges delivery.
        consumerConfirmationType:
          oneOf:
            - $ref: '#/components/schemas/ConsumerConfirmationType'
            - type: "null"
          description: >
            Indicates whether consumer confirmation happened explicitly via the API or automatically after the 7-day waiting period.
        autoConfirmAt:
          type:
            - string
            - "null"
          format: date-time
          description: >
            Timestamp at which the booking will be auto-completed if the second party does not acknowledge delivery in time.
        cancelledAt:
          type:
            - string
            - "null"
          format: date-time
          description: Set when the booking is cancelled, refused, or expired.
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
          description: >
            Deadline by which a CONFIRMED booking must be paid. After this time the booking is automatically transitioned to EXPIRED.

    BookingListingPreview:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: "Laptop setup and software installation"

    BookingParticipant:
      type: object
      required:
        - userId
        - name
        - surname
      properties:
        userId:
          type: string
          format: uuid
          example: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: "Anna"
        surname:
          type: string
          minLength: 1
          maxLength: 120
          example: "Schmidt"

    BookingServiceAddress:
      type: object
      required:
        - street
        - houseNumber
        - city
        - postalCode
      description: >
        The address at which the service will be delivered. The values are resolved at response time from the relevant source: for AT_CONSUMER bookings, the consumer's private address; for AT_PROVIDER bookings, the listing's address.
      properties:
        street:
          type: string
          example: "Brunnenstraße"
        houseNumber:
          type: string
          example: "25"
        city:
          type: string
          example: "Berlin"
        postalCode:
          type: string
          example: "10119"

    BookingCollectionResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookingSummary'
        page:
          $ref: '#/components/schemas/CursorPageMetadata'

    ProviderAvailabilityResponse:
      type: object
      required:
        - providerId
        - timezone
        - days
      properties:
        providerId:
          type: string
          format: uuid
          example: "22bb22bb-2222-2222-2222-bbbbbbbbbbbb"
        timezone:
          type: string
          description: IANA timezone identifier in which the provider's working hours are defined.
          example: "Europe/Berlin"
        days:
          type: array
          description: One entry per day in the requested range, in chronological order.
          items:
            $ref: '#/components/schemas/ProviderAvailabilityDay'

    ProviderAvailabilityDay:
      type: object
      required:
        - date
        - workingHours
        - freeWindows
      properties:
        date:
          type: string
          format: date
          example: "2026-04-28"
        workingHours:
          type: array
          description: >
            The provider's working hours envelope for this day, derived from the recurring weekly schedule and any AVAILABLE schedule exceptions. May be empty when the provider does not work on this day.
          items:
            $ref: '#/components/schemas/TimeRange'
        freeWindows:
          type: array
          description: >
            Time windows within workingHours that are still bookable, after subtracting BLOCKED schedule exceptions and active bookings.
          items:
            $ref: '#/components/schemas/TimeRange'

    TimeRange:
      type: object
      required:
        - start
        - end
      properties:
        start:
          type: string
          format: date-time
          example: "2026-04-28T14:00:00Z"
        end:
          type: string
          format: date-time
          example: "2026-04-28T18:00:00Z"

    CursorPageMetadata:
      type: object
      required:
        - limit
        - nextCursor
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
          readOnly: true
          description: Maximum number of items returned.
          example: 20
        nextCursor:
          type:
            - string
            - "null"
          readOnly: true
          description: Opaque cursor for fetching the next page. Null if no next page exists.
          example: null

    BookingStatus:
      type: string
      enum:
        - PENDING
        - CONFIRMED
        - PAID
        - AWAITING_CONFIRMATION
        - COMPLETED
        - CANCELLED
        - EXPIRED
        - REFUSED

    ConsumerConfirmationType:
      type: string
      enum:
        - EXPLICIT
        - AUTO

    LocationType:
      type: string
      enum:
        - AT_CONSUMER
        - AT_PROVIDER
        - REMOTE

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          format: uri
          example: "https://api.mira.example/problems/validation-error"
        title:
          type: string
          example: "Bad Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Request body validation failed"
        instance:
          type: string
          example: "/v1/bookings"
        errors:
          type: array
          description: Field-level validation errors when available.
          items:
            $ref: '#/components/schemas/ProblemInvalidParam'

    ProblemInvalidParam:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: "durationHours"
        message:
          type: string
          example: "must be a multiple of 0.5"

                invalidState:
                  value:
                    type: "https://api.mira.example/problems/resource-conflict"
                    title: "Conflict"
                    status: 409
                    detail: "Only pending bookings can be refused"
                    instance: "/v1/bookings/3f2a1c8e-2b4d-4f6a-9c1e-7d8b2a5e3f10/refuse"

  /v1/bookings/{bookingId}/mark-delivered:
    parameters:
      - $ref: '#/components/parameters/BookingIdParam'
    post:
      summary: Mark booking as delivered
      description: >
        Allows the provider to mark the service as delivered. If this is the first acknowledgement on a PAID booking, the booking transitions to AWAITING_CONFIRMATION and the consumer has 7 days to acknowledge delivery before the booking is auto-completed. If the consumer already acknowledged delivery first, this call completes the booking immediately. If the provider never calls this endpoint, the system auto-marks delivery 7 days after bookedEnd and starts the same 7-day consumer confirmation window.

openapi: 3.1.0

info:
  title: Mira API
  version: "1.0.0"
  description: >
    This API describes the backend of Mira, a platform for offering and booking services.
    It enables users to search for service providers, view service details, manage bookings,
    communicate with each other, and handle payments and scheduling.
    The platform is designed to support everyday local services in a simple and accessible way.

servers:
  - url: http://127.0.0.1:8080
    description: Local development backend server for the Mira REST API

tags:
  - name: Auth
    description: Placeholder for future authentication resources such as login, logout, and token refresh.
  - name: Me
    description: Read-only convenience representation of the current authenticated user's account and private profile state. Changes must be made through the underlying account and user resources.
  - name: Accounts
    description: Account registration, account data, and local credential resources.
  - name: Users
    description: Private user profile resources. These routes expose authenticated private profile representations and profile updates. Collection reads are restricted to admin accounts.
  - name: Public User Profiles
    description: Publicly visible user profile projections used for discovery and profile viewing.
  - name: User Credentials
    description: Credential resources attached to user profiles. The /credentials routes expose public credential projections, while /credential-records routes expose the managed credential records used for submission, review, visibility, and deletion.

paths:
  /v1/me:
    get:
      tags:
        - Me
      operationId: getMe
      summary: Get current authenticated user context
      description: >
        Returns a composed read-only convenience representation for the currently authenticated account.
        This includes account information, the full private user profile, and derived registration state
        required by the client to initialize the application.

        This endpoint does not mutate state. Changes must be made through the underlying account and user resources.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user context retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              examples:
                default:
                  summary: Example current authenticated user context
                  value:
                    account:
                      accountId: "123e4567-e89b-12d3-a456-426614174000"
                      localCredentials:
                        email: "user@example.com"
                        emailVerified: false
                      authProviders:
                        - LOCAL
                    user:
                      userId: "223e4567-e89b-12d3-a456-426614174000"
                      username: "anna_schmidt"
                      firstName: "Anna"
                      lastName: "Schmidt"
                      bio: ""
                      simplifiedBio: null
                      selfSummary: "Computer help in Hof."
                      isPublic: true
                      primaryAddress:
                        postalCode: "95028"
                        city: "Hof"
                        street: "Example Street"
                        houseNumber: "12a"
                      profileMedia: null
                    registrationComplete: true
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts:
    get:
      tags:
        - Accounts
      operationId: listAccounts
      summary: List accounts
      description: >
        Returns a cursor-paginated collection of account resources.
        Access requires the permission canAccessAdminRoutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/AfterCursorParam'
      responses:
        '200':
          description: Account collection retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCollectionResponse'
        '400':
          description: Bad Request. One or more pagination query parameters are invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/local:
    post:
      tags:
        - Accounts
      operationId: createLocalAccount
      summary: Create local account
      description: >
        Creates a new account with local credentials.
        Local credentials consist of an email address and password hash internally.
        The password itself is never returned.
        A linked user profile shell is initialized as part of account creation.
        This route does not create an authenticated session and does not return authentication tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocalAccountRequest'
            examples:
              default:
                summary: Example local account creation request
                value:
                  email: "user@example.com"
                  password: "password123"
      responses:
        '201':
          description: Local account created successfully.
          headers:
            Location:
              description: URI of the created account resource.
              required: true
              schema:
                type: string
                format: uri-reference
                examples:
                  - "/v1/accounts/123e4567-e89b-12d3-a456-426614174000"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          description: Bad Request. The local account creation payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The requested email address is already assigned to another account.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/{accountId}:
    get:
      tags:
        - Accounts
      operationId: getAccount
      summary: Get account
      description: >
        Returns the account resource identified by accountId.
        Access is allowed when the authenticated account owns the target account
        or has the permission canAccessAdminRoutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      responses:
        '200':
          description: Account retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target account and does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No account exists for the given accountId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/{accountId}/local-credentials:
    post:
      tags:
        - Accounts
      operationId: createLocalCredentials
      summary: Add local credentials
      description: >
        Creates local credentials for the account identified by accountId.
        This is used when an account exists without local credentials, for example an account created through an external authentication provider.
        Access is allowed only when the authenticated account owns the target account.
        The password itself is never returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocalCredentialsRequest'
      responses:
        '201':
          description: Local credentials created successfully.
          headers:
            Location:
              description: URI of the created local credentials resource.
              required: true
              schema:
                type: string
                format: uri-reference
                examples:
                  - "/v1/accounts/123e4567-e89b-12d3-a456-426614174000/local-credentials"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalCredentialsResponse'
        '400':
          description: Bad Request. The local credentials creation payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target account.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No account exists for the given accountId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. Local credentials cannot be created because of the current account state or requested email address.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/{accountId}/local-credentials/email:
    patch:
      tags:
        - Accounts
      operationId: updateLocalCredentialsEmail
      summary: Update local credentials email
      description: >
        Updates the email address of the local credentials belonging to the account identified by accountId.
        Access is allowed when the authenticated account owns the target account
        or has the permission canAccessAdminRoutes.
        Updating the local credentials email resets emailVerified to false.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocalCredentialsEmailRequest'
      responses:
        '200':
          description: Local credentials email updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalCredentialsResponse'
        '400':
          description: Bad Request. The local credentials email update payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target account and does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. The target account or its local credentials resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The requested email address is already assigned to another account.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/{accountId}/local-credentials/password:
    patch:
      tags:
        - Accounts
      operationId: updateLocalCredentialsPassword
      summary: Update local credentials password
      description: >
        Updates the password of the local credentials belonging to the account identified by accountId.
        Access is allowed only when the authenticated account owns the target account.
        Admin accounts cannot use this route to change another account password.
        The request must contain the current password and the new password.
        The current password must match the existing local password.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocalCredentialsPasswordRequest'
      responses:
        '204':
          description: Local credentials password updated successfully. No response body is returned.
        '400':
          description: Bad Request. The local credentials password update payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target account or the provided current password is incorrect.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. The target account or its local credentials resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/{accountId}/local-credentials/send-verification-email:
    post:
      tags:
        - Accounts
      operationId: sendLocalCredentialsVerificationEmail
      summary: Send local credentials verification email
      description: >
        Sends a verification email for the local credentials belonging to the account identified by accountId.
        Access is allowed only when the authenticated account owns the target account.
        A 202 response means the request was accepted for asynchronous processing and does not guarantee immediate delivery.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      responses:
        '202':
          description: Verification email request accepted for asynchronous processing.
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target account.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. The target account or its local credentials resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The local credentials email address is already verified.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/accounts/{accountId}/local-credentials/confirm-email:
    post:
      tags:
        - Accounts
      operationId: confirmLocalCredentialsEmail
      summary: Confirm local credentials email
      description: >
        Confirms the email address of the local credentials belonging to the account identified by accountId.
        Access is allowed only when the authenticated account owns the target account.
        The request must contain a valid verification token.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmLocalCredentialsEmailRequest'
      responses:
        '200':
          description: Local credentials email confirmed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalCredentialsResponse'
        '400':
          description: Bad Request. The email confirmation payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target account.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. The target account or its local credentials resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The verification token cannot be applied to the current local credentials state.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users:
    get:
      tags:
        - Users
      operationId: listPrivateUserProfiles
      summary: List private user profiles
      description: >
        Returns a cursor-paginated collection of private user profile resources.
        Access requires the permission canAccessAdminRoutes.
      parameters:
        - name: query
          in: query
          required: false
          description: >
            Free search string matched against private user profile fields such as username,
            first name, and last name.
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/AfterCursorParam'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Private user profiles retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfileCollectionResponse'
        '400':
          description: Bad Request. One or more query parameters are invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/{userId}:
    get:
      tags:
        - Users
      operationId: getPrivateUserProfile
      summary: Get private user profile
      description: >
        Returns the private user profile identified by userId.
        Access is allowed when the authenticated account owns the target user profile
        or has the permission canAccessAdminRoutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Private user profile retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfileResponse'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile and does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile exists for the given userId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    patch:
      tags:
        - Users
      operationId: updateUserProfile
      summary: Update user profile
      description: >
        Partially updates the user profile identified by userId.
        Access is allowed when the authenticated account owns the target user profile
        or has the permission canAccessAdminRoutes.
        The request can update username, firstName, lastName, bio, selfSummary, isPublic, and primaryAddress.
        Optional text fields use empty strings to represent unset values.
        simplifiedBio cannot be updated through this route.
        If primaryAddress is provided, it must be provided as a complete address object.
        A formally valid address may still be rejected if it cannot be validated as an existing address.
        This operation may also cause registrationComplete to become true as a backend-controlled side effect
        when the update provides the data required for the user profile to leave its shell state.
        registrationComplete cannot be set explicitly in the request payload.
        Clients can observe the resulting private profile state through GET /v1/users/{userId}.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: >
            User profile updated successfully.
            The backend may also mark registration as complete as part of the same update if the shell state ends.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserProfileResponse'
        '400':
          description: Bad Request. The user profile update payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile and does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile exists for the given userId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The requested username is already assigned to another user profile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Unprocessable Entity. The submitted address is formally valid but could not be validated as an existing address.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/public-user-profiles:
    get:
      tags:
        - Public User Profiles
      operationId: searchPublicUserProfiles
      summary: Search public user profiles
      description: >
        Returns a cursor-paginated collection of public user profiles.
        A user profile is publicly eligible only when registrationComplete is true
        and isPublic is true.
        Incomplete profiles and profiles with public visibility disabled are never included.
      parameters:
        - name: query
          in: query
          required: false
          description: >
            Free search string matched against public user fields such as username,
            first name, and last name.
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/AfterCursorParam'
      responses:
        '200':
          description: Public user profiles retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfileCollectionResponse'
        '400':
          description: Bad Request. One or more query parameters are invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/public-user-profiles/{userId}:
    get:
      tags:
        - Public User Profiles
      operationId: getPublicUserProfile
      summary: Get public user profile
      description: >
        Returns the public user profile identified by userId.
        A user profile is publicly eligible only when registrationComplete is true
        and isPublic is true.
        If the user profile does not exist, registration is incomplete, or public visibility is disabled,
        no public user profile is returned.
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Public user profile retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfileResponse'
        '404':
          description: Not Found. No public user profile exists for the given userId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/{userId}/credentials:
    get:
      tags:
        - User Credentials
      operationId: listPublicUserCredentials
      summary: List public user credentials
      description: >
        Returns the public credential projection for the user profile identified by userId.
        Public credentials are derived from the user's credential records.
        The parent user profile must be publicly eligible, meaning registrationComplete is true and isPublic is true.
        Only credential records with status ACTIVE and isVisible set to true are included.
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Public user credentials retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserCredentialCollectionResponse'
        '404':
          description: Not Found. No public user profile exists for the given userId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/{userId}/credentials/{credentialRecordId}:
    get:
      tags:
        - User Credentials
      operationId: getPublicUserCredential
      summary: Get public user credential
      description: >
        Returns the public credential projection identified by credentialRecordId for the user profile identified by userId.
        Public credentials are derived from the user's credential records.
        The parent user profile must be publicly eligible, meaning registrationComplete is true and isPublic is true.
        This route returns only credentials with status ACTIVE and isVisible set to true.
        If the user profile does not exist, is not publicly eligible, the credential record does not belong to the user,
        or the credential record is not part of the public projection, no public credential is returned.
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/CredentialRecordIdParam'
      responses:
        '200':
          description: Public user credential retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserCredentialResponse'
        '404':
          description: Not Found. No public user credential exists for the given identifiers.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/{userId}/credential-records:
    get:
      tags:
        - User Credentials
      operationId: listCredentialRecords
      summary: List credential records
      description: >
        Returns all credential records assigned to the user profile identified by userId.
        This includes pending, active, expired, denied, and hidden credential records.
        Access is allowed when the authenticated account owns the target user profile
        or has the permission canAccessAdminRoutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Credential records retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecordCollectionResponse'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile and does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile exists for the given userId.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    post:
      tags:
        - User Credentials
      operationId: submitCredentialRecord
      summary: Submit credential record
      description: >
        Submits one credential claim for the user profile identified by userId.
        Access is allowed only when the authenticated account owns the target user profile.
        The request references a preseeded credential type and one uploaded evidence media file.
        If accepted, the backend creates a credential record with status PENDING and isVisible set to false.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCredentialRecordRequest'
      responses:
        '201':
          description: Credential record submitted successfully.
          headers:
            Location:
              description: URI of the created credential record.
              required: true
              schema:
                type: string
                format: uri-reference
                examples:
                  - "/v1/users/223e4567-e89b-12d3-a456-426614174000/credential-records/423e4567-e89b-12d3-a456-426614174000"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecordResponse'
        '400':
          description: Bad Request. The credential submission payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. The target user profile, credential type, or evidence media resource does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The user already has a credential record for the requested credential type.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/{userId}/credential-records/{credentialRecordId}:
    get:
      tags:
        - User Credentials
      operationId: getCredentialRecord
      summary: Get credential record
      description: >
        Returns one credential record assigned to the user profile identified by userId.
        Access is allowed when the authenticated account owns the target user profile
        or has the permission canAccessAdminRoutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/CredentialRecordIdParam'
      responses:
        '200':
          description: Credential record retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecordResponse'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile and does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile or credential record exists for the given identifiers.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    patch:
      tags:
        - User Credentials
      operationId: updateCredentialRecordLifecycle
      summary: Update credential record lifecycle
      description: >
        Updates lifecycle fields of a credential record.
        Access requires the permission canAccessAdminRoutes.
        This operation can update status and expiresAt.
        It does not update isVisible; visibility is updated through the visibility route.

        The backend decides and validates all requested status changes according to credential lifecycle rules.
        Typical transitions include PENDING to ACTIVE, PENDING to DENIED, and ACTIVE to EXPIRED.
        Invalid transitions return 409 Conflict.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/CredentialRecordIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialRecordLifecycleRequest'
      responses:
        '200':
          description: Credential record lifecycle updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecordResponse'
        '400':
          description: Bad Request. The credential record lifecycle update payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account does not have the permission canAccessAdminRoutes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile or credential record exists for the given identifiers.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict. The requested status change conflicts with the current credential lifecycle state.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    delete:
      tags:
        - User Credentials
      operationId: deleteCredentialRecord
      summary: Delete credential record
      description: >
        Deletes a credential record assigned to the user profile identified by userId.
        Access is allowed only when the authenticated account owns the target user profile.
        Admin accounts cannot use this route to delete another user's credential record.
        Deleting a credential record removes it from the managed credential records collection
        and from the public credential projection if it was publicly visible.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/CredentialRecordIdParam'
      responses:
        '204':
          description: Credential record deleted successfully. No response body is returned.
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile or credential record exists for the given identifiers.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /v1/users/{userId}/credential-records/{credentialRecordId}/visibility:
    patch:
      tags:
        - User Credentials
      operationId: updateCredentialRecordVisibility
      summary: Update credential record visibility
      description: >
        Updates the visibility setting of a credential record.
        Access is allowed only when the authenticated account owns the target user profile.
        This operation only updates isVisible.
        Setting isVisible to true makes the credential eligible to appear in the public credentials collection,
        but only while its status is ACTIVE and the parent user profile is publicly eligible.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/CredentialRecordIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialRecordVisibilityRequest'
      responses:
        '200':
          description: Credential record visibility updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRecordResponse'
        '400':
          description: Bad Request. The visibility update payload is invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized. Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden. The authenticated account is not the owner of the target user profile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found. No user profile or credential record exists for the given identifiers.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AccountIdParam:
      name: accountId
      in: path
      required: true
      description: Account UUID.
      schema:
        type: string
        format: uuid

    UserIdParam:
      name: userId
      in: path
      required: true
      description: User UUID.
      schema:
        type: string
        format: uuid

    CredentialRecordIdParam:
      name: credentialRecordId
      in: path
      required: true
      description: Credential record UUID.
      schema:
        type: string
        format: uuid

    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Defaults to 20 when omitted.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    AfterCursorParam:
      name: after
      in: query
      required: false
      description: >
        Opaque cursor for fetching the next page.
        If omitted, the first page is returned.
      schema:
        type: string

  schemas:
    MeResponse:
      type: object
      required:
        - account
        - user
        - registrationComplete
      properties:
        account:
          $ref: '#/components/schemas/MeAccountResponse'
        user:
          $ref: '#/components/schemas/PrivateUserProfileResponse'
        registrationComplete:
          type: boolean
          readOnly: true
          description: >
            Indicates whether registration/profile setup is complete for the current account.
            A user profile is publicly eligible only when this value is true and isPublic is true.
            This value is controlled by backend registration logic, is not directly writable,
            and may become true as a side effect of a successful user profile update once the
            profile leaves its shell state.

    MeAccountResponse:
      type: object
      required:
        - accountId
        - localCredentials
        - authProviders
      properties:
        accountId:
          type: string
          format: uuid
          readOnly: true
          description: Account identifier.
        localCredentials:
          description: Local credentials linked to the account. Null if local login is not enabled.
          oneOf:
            - $ref: '#/components/schemas/LocalCredentialsResponse'
            - type: "null"
        authProviders:
          type: array
          readOnly: true
          description: Authentication providers linked to the account.
          items:
            $ref: '#/components/schemas/AuthProvider'

    CreateLocalAccountRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          description: Email address used for local account login.
        password:
          type: string
          minLength: 8
          maxLength: 255
          writeOnly: true
          description: Password used for local account login.

    CreateLocalCredentialsRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          description: Email address used for local account login.
        password:
          type: string
          minLength: 8
          maxLength: 255
          writeOnly: true
          description: Password used for local account login.

    UpdateLocalCredentialsEmailRequest:
      type: object
      required:
        - email
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          description: New email address used for local account login.

    UpdateLocalCredentialsPasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      additionalProperties: false
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 255
          writeOnly: true
          description: Current local account password.
        newPassword:
          type: string
          minLength: 8
          maxLength: 255
          writeOnly: true
          description: New local account password.

    ConfirmLocalCredentialsEmailRequest:
      type: object
      required:
        - token
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 2048
          writeOnly: true
          description: Email verification token.

    UpdateUserProfileRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        username:
          $ref: '#/components/schemas/Username'
        firstName:
          $ref: '#/components/schemas/FirstName'
        lastName:
          $ref: '#/components/schemas/LastName'
        bio:
          $ref: '#/components/schemas/Bio'
        selfSummary:
          $ref: '#/components/schemas/SelfSummary'
        isPublic:
          type: boolean
          description: >
            Indicates whether the user wants the profile to be publicly visible.
            A profile is publicly accessible only when isPublic is true and registrationComplete is true.
        primaryAddress:
          $ref: '#/components/schemas/UserAddressRequest'

    SubmitCredentialRecordRequest:
      type: object
      required:
        - credentialType
        - evidenceMediaId
      additionalProperties: false
      properties:
        credentialType:
          $ref: '#/components/schemas/CredentialType'
        evidenceMediaId:
          type: string
          format: uuid
          description: Media UUID of the uploaded evidence file.

    UpdateCredentialRecordVisibilityRequest:
      type: object
      required:
        - isVisible
      additionalProperties: false
      properties:
        isVisible:
          type: boolean
          description: Whether the credential should be visible on the public user profile when it is active.

    UpdateCredentialRecordLifecycleRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/CredentialStatus'
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
          description: Expiration date and time of the credential. Null if the credential does not expire.

    AccountResponse:
      type: object
      required:
        - accountId
        - userId
        - localCredentials
        - authProviders
      properties:
        accountId:
          type: string
          format: uuid
          readOnly: true
          description: Account identifier.
        userId:
          type: string
          format: uuid
          readOnly: true
          description: Identifier of the linked user profile.
        localCredentials:
          description: Local credentials linked to the account. Null if local login is not enabled.
          oneOf:
            - $ref: '#/components/schemas/LocalCredentialsResponse'
            - type: "null"
        authProviders:
          type: array
          readOnly: true
          description: Authentication providers currently linked to this account.
          items:
            $ref: '#/components/schemas/AuthProvider'

    LocalCredentialsResponse:
      type: object
      required:
        - email
        - emailVerified
      properties:
        email:
          type: string
          format: email
          description: Email address used for local account login.
        emailVerified:
          type: boolean
          readOnly: true
          description: Whether the local credentials email address has been verified.

    AccountCollectionResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          description: Account resources.
          items:
            $ref: '#/components/schemas/AccountResponse'
        page:
          $ref: '#/components/schemas/CursorPageMetadata'

    PublicUserProfileCollectionResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          description: Public user profiles.
          items:
            $ref: '#/components/schemas/PublicUserProfileResponse'
        page:
          $ref: '#/components/schemas/CursorPageMetadata'

    PrivateUserProfileCollectionResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          description: Private user profiles.
          items:
            $ref: '#/components/schemas/PrivateUserProfileResponse'
        page:
          $ref: '#/components/schemas/CursorPageMetadata'

    PublicUserCredentialCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Public credential projections.
          items:
            $ref: '#/components/schemas/PublicUserCredentialResponse'

    CredentialRecordCollectionResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Credential records.
          items:
            $ref: '#/components/schemas/CredentialRecordResponse'

    PublicUserProfileResponse:
      type: object
      required:
        - userId
        - username
        - firstName
        - lastName
        - bio
        - simplifiedBio
        - selfSummary
        - profileMedia
      properties:
        userId:
          type: string
          format: uuid
          readOnly: true
          description: User profile identifier.
        username:
          $ref: '#/components/schemas/Username'
        firstName:
          $ref: '#/components/schemas/FirstName'
        lastName:
          $ref: '#/components/schemas/LastName'
        bio:
          $ref: '#/components/schemas/Bio'
        simplifiedBio:
          $ref: '#/components/schemas/SimplifiedBio'
        selfSummary:
          $ref: '#/components/schemas/SelfSummary'
        profileMedia:
          oneOf:
            - $ref: '#/components/schemas/ProfileMediaResponse'
            - type: "null"

    PrivateUserProfileResponse:
      type: object
      required:
        - userId
        - username
        - firstName
        - lastName
        - bio
        - simplifiedBio
        - selfSummary
        - registrationComplete
        - isPublic
        - primaryAddress
        - profileMedia
      properties:
        userId:
          type: string
          format: uuid
          readOnly: true
          description: User profile identifier.
        username:
          $ref: '#/components/schemas/Username'
        firstName:
          $ref: '#/components/schemas/FirstName'
        lastName:
          $ref: '#/components/schemas/LastName'
        bio:
          $ref: '#/components/schemas/Bio'
        simplifiedBio:
          $ref: '#/components/schemas/SimplifiedBio'
        selfSummary:
          $ref: '#/components/schemas/SelfSummary'
        registrationComplete:
          type: boolean
          readOnly: true
          description: >
            Indicates whether registration/profile setup is complete for this user profile.
            This value is controlled by backend registration logic and may become true as a side effect
            of a successful profile update once the profile leaves its shell state.
        isPublic:
          type: boolean
          description: >
            Indicates whether the user wants the profile to be publicly visible.
            A profile is publicly accessible only when isPublic is true and registrationComplete is true.
        primaryAddress:
          $ref: '#/components/schemas/UserAddressResponse'
        profileMedia:
          oneOf:
            - $ref: '#/components/schemas/ProfileMediaResponse'
            - type: "null"

    PublicUserCredentialResponse:
      type: object
      required:
        - credentialRecordId
        - credentialType
        - displayName
        - grantedAt
        - expiresAt
      properties:
        credentialRecordId:
          type: string
          format: uuid
          readOnly: true
          description: Credential record identifier.
        credentialType:
          $ref: '#/components/schemas/CredentialType'
        displayName:
          type: string
          readOnly: true
          description: Human readable credential name.
          examples:
            - "Student"
        grantedAt:
          type: string
          format: date-time
          readOnly: true
          description: Date and time when the credential became active.
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
          readOnly: true
          description: Date and time when the credential expires. Null if the credential does not expire.

    CredentialRecordResponse:
      type: object
      required:
        - credentialRecordId
        - credentialType
        - displayName
        - status
        - isVisible
        - evidenceMedia
        - grantedAt
        - expiresAt
      properties:
        credentialRecordId:
          type: string
          format: uuid
          readOnly: true
          description: Credential record identifier.
        credentialType:
          $ref: '#/components/schemas/CredentialType'
        displayName:
          type: string
          readOnly: true
          description: Human readable credential name.
          examples:
            - "Student"
        status:
          $ref: '#/components/schemas/CredentialStatus'
        isVisible:
          type: boolean
          description: Whether the credential is eligible to appear on the public user profile when active.
        evidenceMedia:
          $ref: '#/components/schemas/MediaReference'
        grantedAt:
          type:
            - string
            - "null"
          format: date-time
          readOnly: true
          description: Date and time when the credential became active. Null if the credential has not been granted yet.
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
          description: Date and time when the credential expires. Null if the credential does not expire.

    MediaReference:
      type: object
      required:
        - mediaId
      properties:
        mediaId:
          type: string
          format: uuid
          readOnly: true
          description: Media identifier.

    Username:
      type: string
      minLength: 3
      maxLength: 50
      pattern: '^[a-z0-9_]+$'
      description: Public username. Only lowercase letters, numbers, and underscores are allowed.

    FirstName:
      type: string
      minLength: 1
      maxLength: 120
      description: First name. The value must not be blank.

    LastName:
      type: string
      minLength: 1
      maxLength: 120
      description: Last name. The value must not be blank.

    Bio:
      type: string
      maxLength: 2000
      description: Optional profile biography. Empty string means no biography is set.

    SimplifiedBio:
      type:
        - string
        - "null"
      maxLength: 2000
      readOnly: true
      description: >
        Optional AI generated simplified version of the profile biography.
        Null if it has not been generated yet.
        This field is output only and cannot be set through user profile update routes.

    SelfSummary:
      type: string
      maxLength: 200
      description: Optional short profile summary. Empty string means no summary is set.

    UserAddressRequest:
      type: object
      required:
        - postalCode
        - city
        - street
        - houseNumber
      additionalProperties: false
      properties:
        postalCode:
          type: string
          pattern: '^[0-9]{5}$'
          description: German postal code.
          examples:
            - "95028"
        city:
          type: string
          minLength: 1
          maxLength: 120
          description: City name. The value must not be blank.
          examples:
            - "Hof"
        street:
          type: string
          minLength: 1
          maxLength: 120
          description: Street name. The value must not be blank.
          examples:
            - "Example Street"
        houseNumber:
          type: string
          minLength: 1
          maxLength: 10
          pattern: '^[0-9]+[a-zA-Z]?$'
          description: German house number in simple numeric form with an optional letter.
          examples:
            - "12"
            - "12a"

    UserAddressResponse:
      type: object
      required:
        - postalCode
        - city
        - street
        - houseNumber
      properties:
        postalCode:
          type: string
          pattern: '^[0-9]{5}$'
          description: German postal code.
        city:
          type: string
          minLength: 1
          maxLength: 120
          description: City name.
        street:
          type: string
          minLength: 1
          maxLength: 120
          description: Street name.
        houseNumber:
          type: string
          minLength: 1
          maxLength: 10
          pattern: '^[0-9]+[a-zA-Z]?$'
          description: German house number in simple numeric form with an optional letter.

    ProfileMediaResponse:
      type: object
      description: Placeholder schema for profile media. Concrete media fields will be refined later.
      additionalProperties: true

    CursorPageMetadata:
      type: object
      required:
        - limit
        - nextCursor
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
          readOnly: true
          description: Maximum number of items returned.
          examples:
            - 20
        nextCursor:
          type:
            - string
            - "null"
          readOnly: true
          description: Cursor for fetching the next page. Null if no next page exists.
          examples:
            - null

    AuthProvider:
      type: string
      description: Authentication provider linked to an account.
      enum:
        - LOCAL
        - GOOGLE

    CredentialType:
      type: string
      description: Type of credential assigned to a user profile.
      enum:
        - STUDENT
        - ELECTRICIAN
        - PLUMBER
        - TUTOR

    CredentialStatus:
      type: string
      description: Current status of a credential record assigned to a user profile.
      enum:
        - PENDING
        - ACTIVE
        - EXPIRED
        - DENIED

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          format: uri
          readOnly: true
        title:
          type: string
          readOnly: true
        status:
          type: integer
          readOnly: true
        detail:
          type: string
          readOnly: true
        instance:
          type: string
          format: uri-reference
          readOnly: true
        errors:
          type: array
          readOnly: true
          description: Field-level validation errors when available.
          items:
            $ref: '#/components/schemas/ProblemInvalidParameter'

    ProblemInvalidParameter:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          readOnly: true
        message:
          type: string
          readOnly: true

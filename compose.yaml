services:
  backend:
    build:
      context: .
      dockerfile: containers/backend/Dockerfile
      target: dev
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - .:/app
      - backend-logs:${LOGS_DIR}
    working_dir: /app

  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    name: ${DB_VOLUME_NAME:-mira-db-data}
  backend-logs:
    name: ${BACKEND_LOGS_VOLUME_NAME:-mira-backend-logs}
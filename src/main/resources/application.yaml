spring:
  application:
    name: mirabackend

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:mira_db}
    username: ${DB_USERNAME:mira}
    password: ${DB_PASSWORD:mira_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  file:
    name: ${LOGS_DIR:/app/logs}/${LOG_FILE_NAME:mira.log}
  level:
    root: INFO
    de.mudkip.mirabackend: DEBUG

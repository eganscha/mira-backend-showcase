  url: http://localhost:8080/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "testuser3",
        "email": "testuser3@example.com",
        "rawPassword": "secret123",
        "firstName": "Test",
        "lastName": "User",
        "accountType": "CUSTOMER",
        "birthdate": "1998-05-12"
